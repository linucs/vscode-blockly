name: Release VSIX

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile

      - run: yarn package

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies -o blocks-editor-${{ github.event.release.tag_name }}.vsix

      - name: Upload VSIX to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.release.tag_name }} blocks-editor-${{ github.event.release.tag_name }}.vsix
