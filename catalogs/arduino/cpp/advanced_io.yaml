# yaml-language-server: $schema=https://raw.githubusercontent.com/linucs/vscode-blockly/refs/heads/main/src/catalog/block-catalog_v1.schema.json
id: arduino_advanced_io
author: Lino Moretto
version: 0.0.1
category: "Input / Output::Advanced"
colour: "#FFB300"
description:
  en: "Generate tones and shift data in and out with timing control."
  it: "Genera toni e trasferisce dati seriali con controllo dei tempi."
  zh-cn: "生成音调并按时序移入移出数据。"
  zh-tw: "產生音調並依時序移入移出資料。"
  fr: "Génère des tonalités et décale les données avec contrôle du temps."
  de: "Erzeugt Töne und schiebt Daten zeitgesteuert ein und aus."
  es: "Genera tonos y desplaza datos con control de tiempo."
  ja: "トーンを生成し、タイミング制御でデータをシフト入出力します。"
  ko: "톤을 생성하고 타이밍 제어로 데이터를 시프트 입출력합니다."
  ru: "Генерирует тоны и сдвигает данные с управлением временем."
  pt-br: "Gera tons e desloca dados com controle de tempo."
  tr: "Tonlar üretir ve zamanlama denetimiyle veri kaydırır."
  pl: "Generuje tony i przesuwa dane z kontrolą czasu."
  cs: "Generuje tóny a posouvá data s časovým řízením."
  hu: "Hangokat generál és adatokat tol be-ki időzítéssel."
implementations:
  - runtime: "arduino:cpp"
    blocks:
      - blockly:
          type: cpp_tone
          message0:
            en: "tone pin %1 frequency %2 Hz for %3 ms"
            it: "tone pin %1 frequenza %2 Hz per %3 ms"
            zh-cn: "tone 引脚 %1 频率 %2 Hz 持续 %3 ms"
            zh-tw: "tone 腳位 %1 頻率 %2 Hz 持續 %3 ms"
            fr: "tone broche %1 fréquence %2 Hz pendant %3 ms"
            de: "tone Pin %1 Frequenz %2 Hz für %3 ms"
            es: "tone pin %1 frecuencia %2 Hz durante %3 ms"
            ja: "tone ピン %1 周波数 %2 Hz 持続 %3 ms"
            ko: "tone 핀 %1 주파수 %2 Hz 동안 %3 ms"
            ru: "tone пин %1 частота %2 Гц длительность %3 мс"
            pt-br: "tone pino %1 frequência %2 Hz por %3 ms"
            tr: "tone pin %1 frekans %2 Hz süre %3 ms"
            pl: "tone pin %1 częstotliwość %2 Hz przez %3 ms"
            cs: "tone pin %1 frekvence %2 Hz po dobu %3 ms"
            hu: "tone láb %1 frekvencia %2 Hz ideig %3 ms"
          args0:
            - type: input_value
              name: PIN
              check: ["Number", "int", "unsigned int", "byte", "word", "uint8_t", "uint16_t", "uint32_t"]
            - type: input_value
              name: FREQUENCY
            - type: input_value
              name: DURATION
          previousStatement: null
          nextStatement: null
          inputsInline: true
          tooltip:
            en: "Generate a square wave of the given frequency (and duration) on a pin."
            it: "Genera un'onda quadra alla frequenza (e durata) indicata su un pin."
            zh-cn: "在引脚上生成指定频率（和持续时间）的方波。"
            zh-tw: "在腳位上產生指定頻率（和持續時間）的方波。"
            fr: "Génère une onde carrée à la fréquence (et durée) indiquée sur une broche."
            de: "Erzeugt eine Rechteckwelle mit der angegebenen Frequenz (und Dauer) auf einem Pin."
            es: "Genera una onda cuadrada con la frecuencia (y duración) indicada en un pin."
            ja: "ピンに指定した周波数（と持続時間）の矩形波を生成します。"
            ko: "핀에 지정된 주파수(및 지속 시간)의 사각파를 생성합니다."
            ru: "Генерирует прямоугольный сигнал заданной частоты (и длительности) на пине."
            pt-br: "Gera uma onda quadrada com a frequência (e duração) indicada em um pino."
            tr: "Bir pinde belirtilen frekansta (ve sürede) kare dalga üretir."
            pl: "Generuje falę prostokątną o podanej częstotliwości (i czasie trwania) na pinie."
            cs: "Generuje obdélníkový signál o dané frekvenci (a době trvání) na pinu."
            hu: "Négyszögjelet generál a megadott frekvencián (és időtartammal) egy lábon."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/advanced-io/tone/"
        codegen:
          body:
            - "tone({{PIN}}, {{FREQUENCY}}, {{DURATION}});"
          inputDefaults:
            PIN: "8"
            FREQUENCY: "440"
            DURATION: "1000"

      - blockly:
          type: cpp_no_tone
          message0:
            en: "noTone pin %1"
            it: "noTone pin %1"
            zh-cn: "noTone 引脚 %1"
            zh-tw: "noTone 腳位 %1"
            fr: "noTone broche %1"
            de: "noTone Pin %1"
            es: "noTone pin %1"
            ja: "noTone ピン %1"
            ko: "noTone 핀 %1"
            ru: "noTone пин %1"
            pt-br: "noTone pino %1"
            tr: "noTone pin %1"
            pl: "noTone pin %1"
            cs: "noTone pin %1"
            hu: "noTone láb %1"
          args0:
            - type: input_value
              name: PIN
              check: ["Number", "int", "unsigned int", "byte", "word", "uint8_t", "uint16_t", "uint32_t"]
          previousStatement: null
          nextStatement: null
          inputsInline: true
          tooltip:
            en: "Stop the square wave started by tone() on a pin."
            it: "Ferma l'onda quadra avviata da tone() su un pin."
            zh-cn: "停止引脚上由 tone() 产生的方波。"
            zh-tw: "停止腳位上由 tone() 產生的方波。"
            fr: "Arrête l'onde carrée démarrée par tone() sur une broche."
            de: "Stoppt die von tone() erzeugte Rechteckwelle auf einem Pin."
            es: "Detiene la onda cuadrada iniciada por tone() en un pin."
            ja: "ピンで tone() により開始された矩形波を停止します。"
            ko: "핀에서 tone()으로 시작된 사각파를 중지합니다."
            ru: "Останавливает прямоугольный сигнал, запущенный tone() на пине."
            pt-br: "Para a onda quadrada iniciada por tone() em um pino."
            tr: "Bir pinde tone() ile başlatılan kare dalgayı durdurur."
            pl: "Zatrzymuje falę prostokątną uruchomioną przez tone() na pinie."
            cs: "Zastaví obdélníkový signál spuštěný funkcí tone() na pinu."
            hu: "Leállítja a tone() által indított négyszögjelet egy lábon."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/advanced-io/noTone/"
        codegen:
          body:
            - "noTone({{PIN}});"
          inputDefaults:
            PIN: "8"

      - blockly:
          type: cpp_pulse_in
          message0:
            en: "%1 pin %2 state %3 timeout %4 µs"
            it: "%1 pin %2 stato %3 timeout %4 µs"
            zh-cn: "%1 引脚 %2 状态 %3 超时 %4 µs"
            zh-tw: "%1 腳位 %2 狀態 %3 逾時 %4 µs"
            fr: "%1 broche %2 état %3 timeout %4 µs"
            de: "%1 Pin %2 Zustand %3 Timeout %4 µs"
            es: "%1 pin %2 estado %3 timeout %4 µs"
            ja: "%1 ピン %2 状態 %3 タイムアウト %4 µs"
            ko: "%1 핀 %2 상태 %3 타임아웃 %4 µs"
            ru: "%1 пин %2 состояние %3 таймаут %4 мкс"
            pt-br: "%1 pino %2 estado %3 timeout %4 µs"
            tr: "%1 pin %2 durum %3 zaman aşımı %4 µs"
            pl: "%1 pin %2 stan %3 timeout %4 µs"
            cs: "%1 pin %2 stav %3 timeout %4 µs"
            hu: "%1 láb %2 állapot %3 időtúllépés %4 µs"
          args0:
            - type: field_dropdown
              name: FUNC
              options:
                - ["pulseIn", "pulseIn"]
                - ["pulseInLong", "pulseInLong"]
            - type: input_value
              name: PIN
              check: ["Number", "int", "unsigned int", "byte", "word", "uint8_t", "uint16_t", "uint32_t"]
            - type: field_dropdown
              name: STATE
              options:
                - ["HIGH", "HIGH"]
                - ["LOW", "LOW"]
            - type: input_value
              name: TIMEOUT
          output: Number
          inputsInline: true
          tooltip:
            en: "Measure the duration (µs) of a pulse on a pin. pulseInLong uses interrupts (longer pulses, needs interrupts enabled)."
            it: "Misura la durata (µs) di un impulso su un pin. pulseInLong usa gli interrupt (impulsi più lunghi, richiede interrupt abilitati)."
            zh-cn: "测量引脚上脉冲的持续时间（µs）。pulseInLong 使用中断（适用于较长脉冲，需启用中断）。"
            zh-tw: "測量腳位上脈衝的持續時間（µs）。pulseInLong 使用中斷（適用於較長脈衝，需啟用中斷）。"
            fr: "Mesure la durée (µs) d'une impulsion sur une broche. pulseInLong utilise les interruptions (impulsions plus longues, interruptions requises)."
            de: "Misst die Dauer (µs) eines Impulses an einem Pin. pulseInLong nutzt Interrupts (längere Impulse, Interrupts müssen aktiviert sein)."
            es: "Mide la duración (µs) de un pulso en un pin. pulseInLong usa interrupciones (pulsos más largos, requiere interrupciones habilitadas)."
            ja: "ピン上のパルスの持続時間（µs）を測定します。pulseInLong は割り込みを使用します（長いパルス向け、割り込みの有効化が必要）。"
            ko: "핀에서 펄스의 지속 시간(µs)을 측정합니다. pulseInLong은 인터럽트를 사용합니다(긴 펄스용, 인터럽트 활성화 필요)."
            ru: "Измеряет длительность (мкс) импульса на пине. pulseInLong использует прерывания (для длинных импульсов, требуются включённые прерывания)."
            pt-br: "Mede a duração (µs) de um pulso em um pino. pulseInLong usa interrupções (pulsos mais longos, requer interrupções habilitadas)."
            tr: "Bir pindeki darbenin süresini (µs) ölçer. pulseInLong kesmeleri kullanır (daha uzun darbeler için, kesmelerin etkin olması gerekir)."
            pl: "Mierzy czas trwania (µs) impulsu na pinie. pulseInLong używa przerwań (dłuższe impulsy, wymagane włączone przerwania)."
            cs: "Měří dobu trvání (µs) pulzu na pinu. pulseInLong používá přerušení (delší pulzy, vyžaduje povolená přerušení)."
            hu: "Méri egy impulzus időtartamát (µs) egy lábon. pulseInLong megszakításokat használ (hosszabb impulzusokhoz, engedélyezett megszakítások szükségesek)."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/advanced-io/pulseIn/"
        codegen:
          body:
            - "{{FUNC}}({{PIN}}, {{STATE}}, {{TIMEOUT}})"
          precedence: ATOMIC
          inputDefaults:
            PIN: "7"
            TIMEOUT: "1000000"

      - blockly:
          type: cpp_shift_out
          message0:
            en: "shiftOut data %1 clock %2 order %3 value %4"
            it: "shiftOut dati %1 clock %2 ordine %3 valore %4"
            zh-cn: "shiftOut 数据 %1 时钟 %2 顺序 %3 值 %4"
            zh-tw: "shiftOut 資料 %1 時脈 %2 順序 %3 值 %4"
            fr: "shiftOut données %1 horloge %2 ordre %3 valeur %4"
            de: "shiftOut Daten %1 Takt %2 Reihenfolge %3 Wert %4"
            es: "shiftOut datos %1 reloj %2 orden %3 valor %4"
            ja: "shiftOut データ %1 クロック %2 順序 %3 値 %4"
            ko: "shiftOut 데이터 %1 클록 %2 순서 %3 값 %4"
            ru: "shiftOut данные %1 такт %2 порядок %3 значение %4"
            pt-br: "shiftOut dados %1 clock %2 ordem %3 valor %4"
            tr: "shiftOut veri %1 saat %2 sıra %3 değer %4"
            pl: "shiftOut dane %1 zegar %2 kolejność %3 wartość %4"
            cs: "shiftOut data %1 hodiny %2 pořadí %3 hodnota %4"
            hu: "shiftOut adat %1 órajel %2 sorrend %3 érték %4"
          args0:
            - type: input_value
              name: DATAPIN
              check: ["Number", "int", "unsigned int", "byte", "word", "uint8_t", "uint16_t", "uint32_t"]
            - type: input_value
              name: CLOCKPIN
              check: ["Number", "int", "unsigned int", "byte", "word", "uint8_t", "uint16_t", "uint32_t"]
            - type: field_dropdown
              name: BITORDER
              options:
                - ["MSBFIRST", "MSBFIRST"]
                - ["LSBFIRST", "LSBFIRST"]
            - type: input_value
              name: VALUE
          previousStatement: null
          nextStatement: null
          inputsInline: true
          tooltip:
            en: "Shift out a byte of data one bit at a time on a data pin, clocked by a clock pin."
            it: "Invia un byte di dati un bit alla volta su un pin dati, sincronizzato da un pin clock."
            zh-cn: "在数据引脚上逐位移出一个字节的数据，由时钟引脚同步。"
            zh-tw: "在資料腳位上逐位元移出一個位元組的資料，由時脈腳位同步。"
            fr: "Envoie un octet de données bit par bit sur une broche de données, cadencé par une broche d'horloge."
            de: "Gibt ein Byte Daten bitweise auf einem Daten-Pin aus, getaktet durch einen Takt-Pin."
            es: "Envía un byte de datos bit a bit por un pin de datos, sincronizado por un pin de reloj."
            ja: "データピンでデータを1ビットずつシフトアウトし、クロックピンで同期します。"
            ko: "데이터 핀에서 한 번에 1비트씩 바이트 데이터를 시프트 아웃하며, 클록 핀으로 동기화합니다."
            ru: "Побитно выдвигает байт данных на пине данных, синхронизируя тактовым пином."
            pt-br: "Envia um byte de dados bit a bit em um pino de dados, sincronizado por um pino de clock."
            tr: "Bir veri pininde verileri bit bit kaydırarak gönderir, saat pini ile senkronize edilir."
            pl: "Wysyła bajt danych bit po bicie na pinie danych, synchronizując pinem zegarowym."
            cs: "Posune bajt dat po jednom bitu na datovém pinu, synchronizovaný hodinovým pinem."
            hu: "Egy bájt adatot bitenként küld ki egy adatlábon, órajel lábbal szinkronizálva."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/advanced-io/shiftOut/"
        codegen:
          body:
            - "shiftOut({{DATAPIN}}, {{CLOCKPIN}}, {{BITORDER}}, {{VALUE}});"
          inputDefaults:
            DATAPIN: "11"
            CLOCKPIN: "12"
            VALUE: "0"

      - blockly:
          type: cpp_shift_in
          message0:
            en: "shiftIn data %1 clock %2 order %3"
            it: "shiftIn dati %1 clock %2 ordine %3"
            zh-cn: "shiftIn 数据 %1 时钟 %2 顺序 %3"
            zh-tw: "shiftIn 資料 %1 時脈 %2 順序 %3"
            fr: "shiftIn données %1 horloge %2 ordre %3"
            de: "shiftIn Daten %1 Takt %2 Reihenfolge %3"
            es: "shiftIn datos %1 reloj %2 orden %3"
            ja: "shiftIn データ %1 クロック %2 順序 %3"
            ko: "shiftIn 데이터 %1 클록 %2 순서 %3"
            ru: "shiftIn данные %1 такт %2 порядок %3"
            pt-br: "shiftIn dados %1 clock %2 ordem %3"
            tr: "shiftIn veri %1 saat %2 sıra %3"
            pl: "shiftIn dane %1 zegar %2 kolejność %3"
            cs: "shiftIn data %1 hodiny %2 pořadí %3"
            hu: "shiftIn adat %1 órajel %2 sorrend %3"
          args0:
            - type: input_value
              name: DATAPIN
              check: ["Number", "int", "unsigned int", "byte", "word", "uint8_t", "uint16_t", "uint32_t"]
            - type: input_value
              name: CLOCKPIN
              check: ["Number", "int", "unsigned int", "byte", "word", "uint8_t", "uint16_t", "uint32_t"]
            - type: field_dropdown
              name: BITORDER
              options:
                - ["MSBFIRST", "MSBFIRST"]
                - ["LSBFIRST", "LSBFIRST"]
          output: Number
          inputsInline: true
          tooltip:
            en: "Shift in a byte of data one bit at a time from a data pin, clocked by a clock pin."
            it: "Ricevi un byte di dati un bit alla volta da un pin dati, sincronizzato da un pin clock."
            zh-cn: "从数据引脚逐位移入一个字节的数据，由时钟引脚同步。"
            zh-tw: "從資料腳位逐位元移入一個位元組的資料，由時脈腳位同步。"
            fr: "Reçoit un octet de données bit par bit depuis une broche de données, cadencé par une broche d'horloge."
            de: "Liest ein Byte Daten bitweise von einem Daten-Pin ein, getaktet durch einen Takt-Pin."
            es: "Recibe un byte de datos bit a bit desde un pin de datos, sincronizado por un pin de reloj."
            ja: "データピンからデータを1ビットずつシフトインし、クロックピンで同期します。"
            ko: "데이터 핀에서 한 번에 1비트씩 바이트 데이터를 시프트 인하며, 클록 핀으로 동기화합니다."
            ru: "Побитно считывает байт данных с пина данных, синхронизируя тактовым пином."
            pt-br: "Recebe um byte de dados bit a bit de um pino de dados, sincronizado por um pino de clock."
            tr: "Bir veri pininden verileri bit bit kaydırarak alır, saat pini ile senkronize edilir."
            pl: "Odbiera bajt danych bit po bicie z pinu danych, synchronizując pinem zegarowym."
            cs: "Načte bajt dat po jednom bitu z datového pinu, synchronizovaný hodinovým pinem."
            hu: "Egy bájt adatot bitenként olvas be egy adatlábról, órajel lábbal szinkronizálva."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/advanced-io/shiftIn/"
        codegen:
          body:
            - "shiftIn({{DATAPIN}}, {{CLOCKPIN}}, {{BITORDER}})"
          precedence: ATOMIC
          inputDefaults:
            DATAPIN: "11"
            CLOCKPIN: "12"
