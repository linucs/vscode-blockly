# Built-in catalog — Analog I/O (arduino:cpp).
# Ported from arduino-app-lab (tested), adapted to this repo:
#  - normalized helpUrl base to docs.arduino.cc.
#  - WYSIWYG placement: config blocks (analogReference, analog*Resolution) emit
#    where they sit (codegen.body). To run them once at startup the user places
#    them inside a `code_setup` container — no automatic routing to setup().
id: arduino_analog_io
category: "Input / Output::Analog"
implementations:
  - runtime: "arduino:cpp"
    blocks:
      # --- analogRead ---
      - blockly:
          type: cpp_analog_read
          message0: "analogRead %1"
          args0:
            - type: input_value
              name: PIN
              check: ["Number", "int", "unsigned int", "long", "unsigned long", "byte", "word", "uint8_t", "uint16_t", "uint32_t", "int8_t", "int16_t", "int32_t"]
          output: Number
          inputsInline: true
          tooltip: "Read the analog voltage on a pin (0–4095 at 12-bit resolution)."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/analog-io/analogRead/"
        codegen:
          body:
            - "analogRead({{PIN}})"
          precedence: ATOMIC
          inputDefaults:
            PIN: "A0"

      # --- analogWrite (PWM) ---
      - blockly:
          type: cpp_analog_write
          message0: "analogWrite pin %1 value %2"
          args0:
            - type: input_value
              name: PIN
              check: ["Number", "int", "unsigned int", "long", "unsigned long", "byte", "word", "uint8_t", "uint16_t", "uint32_t", "int8_t", "int16_t", "int32_t"]
            - type: input_value
              name: VALUE
              check: ["Number", "int", "unsigned int", "long", "unsigned long", "byte", "word", "uint8_t", "uint16_t", "uint32_t", "int8_t", "int16_t", "int32_t"]
          previousStatement: null
          nextStatement: null
          inputsInline: true
          tooltip: "Write a PWM value (0–255) to a pin."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/analog-io/analogWrite/"
        codegen:
          body:
            - "analogWrite({{PIN}}, {{VALUE}});"
          inputDefaults:
            PIN: "3"
            VALUE: "128"

      # --- analogReference (setup-only) ---
      - blockly:
          type: cpp_analog_reference
          message0: "analogReference %1"
          args0:
            - type: field_dropdown
              name: TYPE
              options:
                - ["DEFAULT", "DEFAULT"]
                - ["INTERNAL", "INTERNAL"]
                - ["INTERNAL1V1", "INTERNAL1V1"]
                - ["INTERNAL2V56", "INTERNAL2V56"]
                - ["EXTERNAL", "EXTERNAL"]
          previousStatement: null
          nextStatement: null
          tooltip: "Configure the reference voltage for analogRead. Place inside a 'setup' block to run once at startup."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/analog-io/analogReference/"
        codegen:
          body:
            - "analogReference({{TYPE}});"

      # --- analog resolution: read (ADC) / write (PWM) (consolidated) ---
      # Bits is a union (8/10/12/14); the valid range depends on the chosen
      # function and the board. ADC (read): 10/12/14; PWM (write): 8/10/12.
      - blockly:
          type: cpp_analog_resolution
          message0: "set analog %1 resolution %2 bits"
          args0:
            - type: field_dropdown
              name: FUNC
              options:
                - ["read (ADC)", "analogReadResolution"]
                - ["write (PWM)", "analogWriteResolution"]
            - type: field_dropdown
              name: BITS
              options:
                - ["8 bits", "8"]
                - ["10 bits", "10"]
                - ["12 bits", "12"]
                - ["14 bits", "14"]
          previousStatement: null
          nextStatement: null
          inputsInline: true
          tooltip: "Set the ADC (read) or PWM (write) resolution in bits. Valid range depends on function/board. Place inside a 'setup' block."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/zero-due-mkr-family/analogReadResolution/"
        codegen:
          body:
            - "{{FUNC}}({{BITS}});"
