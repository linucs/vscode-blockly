# Built-in catalog for the arduino:cpp runtime.
#
# Structural blocks owned by the Arduino sketch assembler. This file seeds the
# L2 catalog; domain blocks (Digital I/O, Time, Serial, …) are added alongside.
#
# `code_setup` uses the imperative tier (`generator:`) because it is a "phantom
# container" — it re-routes its nested blocks into setup() rather than emitting
# wrapping syntax, which the declarative template engine cannot express. The
# generator is registered first-party in webview/codegen/firstPartyGenerators.ts.
id: arduino_code_setup
category: Control
implementations:
  - runtime: arduino:cpp
    blocks:
      - blockly:
          type: code_setup
          message0: "setup %1"
          args0:
            - type: input_statement
              name: MEMBERS
          tooltip: "Blocks inside run once at startup, in setup(). Use for begin()/init calls and pinMode()."
        generator: code_setup
---
# Arduino named constants as a value literal (HIGH/LOW, pin modes, LED_BUILTIN).
# Essentially a curated `symbol_literal` (the generic L1 block) restricted to the
# constants from the Arduino Language Reference > Variables > Constants. Slightly
# redundant with symbol_literal, kept for discoverability/completeness.
id: arduino_constants
category: Control
implementations:
  - runtime: arduino:cpp
    blocks:
      - blockly:
          type: cpp_constant
          message0: "%1"
          args0:
            - type: field_dropdown
              name: CONST
              options:
                - ["HIGH", "HIGH"]
                - ["LOW", "LOW"]
                - ["INPUT", "INPUT"]
                - ["OUTPUT", "OUTPUT"]
                - ["INPUT_PULLUP", "INPUT_PULLUP"]
                - ["LED_BUILTIN", "LED_BUILTIN"]
          output: null
          tooltip: "An Arduino named constant: HIGH/LOW, pin modes (INPUT/OUTPUT/INPUT_PULLUP), or LED_BUILTIN."
          helpUrl: "https://docs.arduino.cc/language-reference/en/variables/constants/highLow/"
        codegen:
          body:
            - "{{CONST}}"
          precedence: ATOMIC
---
# Built-in LED on/off — the simplest Arduino demo. Self-contained: sets
# LED_BUILTIN to OUTPUT in setup (internal init of the block, not a separate
# config block), and writes HIGH/LOW where placed.
id: arduino_builtin_led
category: Control
implementations:
  - runtime: arduino:cpp
    blocks:
      - blockly:
          type: cpp_led_builtin
          message0: "turn built-in LED %1"
          args0:
            - type: field_dropdown
              name: STATE
              options:
                - ["on", "HIGH"]
                - ["off", "LOW"]
          previousStatement: null
          nextStatement: null
          tooltip: "Turn the board's built-in LED on or off. Sets LED_BUILTIN to OUTPUT in setup automatically."
          helpUrl: "https://docs.arduino.cc/built-in-examples/basics/Blink/"
        codegen:
          setup:
            - "pinMode(LED_BUILTIN, OUTPUT);"
          body:
            - "digitalWrite(LED_BUILTIN, {{STATE}});"
