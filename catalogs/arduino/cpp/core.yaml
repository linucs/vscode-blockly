# yaml-language-server: $schema=https://raw.githubusercontent.com/linucs/vscode-blockly/refs/heads/main/src/catalog/block-catalog_v1.schema.json
id: arduino_code_setup
docs:
  reference: "https://docs.arduino.cc/language-reference/"
category: Control
colour: "#78909C"
implementations:
  - runtime: arduino:cpp
    blocks:
      - blockly:
          type: code_setup
          message0:
            en: "setup %1"
            it: "setup %1"
            zh-cn: "setup %1"
            zh-tw: "setup %1"
            fr: "setup %1"
            de: "setup %1"
            es: "setup %1"
            ja: "setup %1"
            ko: "setup %1"
            ru: "setup %1"
            pt-br: "setup %1"
            tr: "setup %1"
            pl: "setup %1"
            cs: "setup %1"
            hu: "setup %1"
          args0:
            - type: input_statement
              name: MEMBERS
          tooltip:
            en: "Blocks inside run once at startup, in setup(). Use for begin()/init calls and pinMode()."
            it: "I blocchi all'interno vengono eseguiti una sola volta all'avvio, in setup(). Usalo per le chiamate begin()/init e pinMode()."
            zh-cn: "内部的积木块在启动时执行一次，位于 setup() 中。用于 begin()/init 调用和 pinMode()。"
            zh-tw: "內部的積木塊在啟動時執行一次，位於 setup() 中。用於 begin()/init 呼叫和 pinMode()。"
            fr: "Les blocs à l'intérieur s'exécutent une fois au démarrage, dans setup(). À utiliser pour les appels begin()/init et pinMode()."
            de: "Die Blöcke darin werden beim Start einmal ausgeführt, in setup(). Verwende sie für begin()/init-Aufrufe und pinMode()."
            es: "Los bloques internos se ejecutan una vez al inicio, en setup(). Úsalo para llamadas begin()/init y pinMode()."
            ja: "内部のブロックは起動時に setup() で一度だけ実行されます。begin()/init の呼び出しや pinMode() に使用します。"
            ko: "내부 블록은 시작 시 setup()에서 한 번 실행됩니다. begin()/init 호출과 pinMode()에 사용하세요."
            ru: "Блоки внутри выполняются один раз при запуске, в setup(). Используйте для вызовов begin()/init и pinMode()."
            pt-br: "Os blocos internos são executados uma vez na inicialização, em setup(). Use para chamadas begin()/init e pinMode()."
            tr: "İçerideki bloklar başlangıçta setup() içinde bir kez çalışır. begin()/init çağrıları ve pinMode() için kullanın."
            pl: "Bloki wewnątrz wykonują się raz przy starcie, w setup(). Użyj do wywołań begin()/init i pinMode()."
            cs: "Bloky uvnitř se spustí jednou při startu, v setup(). Použijte pro volání begin()/init a pinMode()."
            hu: "A belső blokkok egyszer futnak le indításkor, a setup()-ban. Használd begin()/init hívásokhoz és pinMode()-hoz."
        generator: code_setup
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/linucs/vscode-blockly/refs/heads/main/src/catalog/block-catalog_v1.schema.json
id: arduino_constants
category: Control
implementations:
  - runtime: arduino:cpp
    blocks:
      - blockly:
          type: cpp_constant
          message0:
            en: "%1"
            it: "%1"
            zh-cn: "%1"
            zh-tw: "%1"
            fr: "%1"
            de: "%1"
            es: "%1"
            ja: "%1"
            ko: "%1"
            ru: "%1"
            pt-br: "%1"
            tr: "%1"
            pl: "%1"
            cs: "%1"
            hu: "%1"
          args0:
            - type: field_dropdown
              name: CONST
              options:
                - ["HIGH", "HIGH"]
                - ["LOW", "LOW"]
                - ["INPUT", "INPUT"]
                - ["OUTPUT", "OUTPUT"]
                - ["INPUT_PULLUP", "INPUT_PULLUP"]
                - ["LED_BUILTIN", "LED_BUILTIN"]
          output: null
          tooltip:
            en: "An Arduino named constant: HIGH/LOW, pin modes (INPUT/OUTPUT/INPUT_PULLUP), or LED_BUILTIN."
            it: "Una costante Arduino: HIGH/LOW, modalità pin (INPUT/OUTPUT/INPUT_PULLUP) o LED_BUILTIN."
            zh-cn: "Arduino 命名常量：HIGH/LOW、引脚模式（INPUT/OUTPUT/INPUT_PULLUP）或 LED_BUILTIN。"
            zh-tw: "Arduino 命名常數：HIGH/LOW、腳位模式（INPUT/OUTPUT/INPUT_PULLUP）或 LED_BUILTIN。"
            fr: "Une constante Arduino nommée : HIGH/LOW, modes de broche (INPUT/OUTPUT/INPUT_PULLUP) ou LED_BUILTIN."
            de: "Eine benannte Arduino-Konstante: HIGH/LOW, Pin-Modi (INPUT/OUTPUT/INPUT_PULLUP) oder LED_BUILTIN."
            es: "Una constante Arduino con nombre: HIGH/LOW, modos de pin (INPUT/OUTPUT/INPUT_PULLUP) o LED_BUILTIN."
            ja: "Arduino の名前付き定数：HIGH/LOW、ピンモード（INPUT/OUTPUT/INPUT_PULLUP）、または LED_BUILTIN。"
            ko: "Arduino 명명 상수: HIGH/LOW, 핀 모드(INPUT/OUTPUT/INPUT_PULLUP) 또는 LED_BUILTIN."
            ru: "Именованная константа Arduino: HIGH/LOW, режимы пинов (INPUT/OUTPUT/INPUT_PULLUP) или LED_BUILTIN."
            pt-br: "Uma constante nomeada do Arduino: HIGH/LOW, modos de pino (INPUT/OUTPUT/INPUT_PULLUP) ou LED_BUILTIN."
            tr: "Arduino adlandırılmış sabiti: HIGH/LOW, pin modları (INPUT/OUTPUT/INPUT_PULLUP) veya LED_BUILTIN."
            pl: "Nazwana stała Arduino: HIGH/LOW, tryby pinów (INPUT/OUTPUT/INPUT_PULLUP) lub LED_BUILTIN."
            cs: "Pojmenovaná konstanta Arduina: HIGH/LOW, režimy pinů (INPUT/OUTPUT/INPUT_PULLUP) nebo LED_BUILTIN."
            hu: "Arduino elnevezett konstans: HIGH/LOW, pin módok (INPUT/OUTPUT/INPUT_PULLUP) vagy LED_BUILTIN."
          helpUrl: "https://docs.arduino.cc/language-reference/en/variables/constants/highLow/"
        codegen:
          body:
            - "{{CONST}}"
          precedence: ATOMIC
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/linucs/vscode-blockly/refs/heads/main/src/catalog/block-catalog_v1.schema.json
id: arduino_builtin_led
category: Control
implementations:
  - runtime: arduino:cpp
    blocks:
      - blockly:
          type: cpp_led_builtin
          message0:
            en: "turn built-in LED %1"
            it: "imposta LED integrato %1"
            zh-cn: "设置板载 LED %1"
            zh-tw: "設定板載 LED %1"
            fr: "mettre la LED intégrée %1"
            de: "eingebaute LED %1"
            es: "poner LED integrado %1"
            ja: "内蔵 LED を %1"
            ko: "내장 LED %1"
            ru: "встроенный LED %1"
            pt-br: "definir LED integrado %1"
            tr: "dahili LED'i %1"
            pl: "ustaw wbudowaną diodę LED %1"
            cs: "nastavit vestavěnou LED %1"
            hu: "beépített LED %1"
          args0:
            - type: field_dropdown
              name: STATE
              options:
                - ["on", "HIGH"]
                - ["off", "LOW"]
          previousStatement: null
          nextStatement: null
          tooltip:
            en: "Turn the board's built-in LED on or off. Sets LED_BUILTIN to OUTPUT in setup automatically."
            it: "Accendi o spegni il LED integrato della scheda. Imposta automaticamente LED_BUILTIN come OUTPUT nel setup."
            zh-cn: "打开或关闭开发板的板载 LED。自动在 setup 中将 LED_BUILTIN 设置为 OUTPUT。"
            zh-tw: "開啟或關閉開發板的板載 LED。自動在 setup 中將 LED_BUILTIN 設定為 OUTPUT。"
            fr: "Allume ou éteint la LED intégrée de la carte. Configure automatiquement LED_BUILTIN en OUTPUT dans setup."
            de: "Schalte die eingebaute LED der Platine ein oder aus. Setzt LED_BUILTIN automatisch auf OUTPUT in setup."
            es: "Enciende o apaga el LED integrado de la placa. Configura automáticamente LED_BUILTIN como OUTPUT en setup."
            ja: "ボードの内蔵 LED をオン/オフします。setup で LED_BUILTIN を自動的に OUTPUT に設定します。"
            ko: "보드의 내장 LED를 켜거나 끕니다. setup에서 LED_BUILTIN을 자동으로 OUTPUT으로 설정합니다."
            ru: "Включает или выключает встроенный LED платы. Автоматически устанавливает LED_BUILTIN как OUTPUT в setup."
            pt-br: "Liga ou desliga o LED integrado da placa. Configura automaticamente LED_BUILTIN como OUTPUT no setup."
            tr: "Kartın dahili LED'ini açar veya kapatır. setup içinde LED_BUILTIN'i otomatik olarak OUTPUT olarak ayarlar."
            pl: "Włącza lub wyłącza wbudowaną diodę LED płytki. Automatycznie ustawia LED_BUILTIN jako OUTPUT w setup."
            cs: "Zapne nebo vypne vestavěnou LED desky. Automaticky nastaví LED_BUILTIN na OUTPUT v setup."
            hu: "Be- vagy kikapcsolja a kártya beépített LED-jét. Automatikusan beállítja a LED_BUILTIN-t OUTPUT-ra a setup-ban."
          helpUrl: "https://docs.arduino.cc/built-in-examples/basics/Blink/"
        codegen:
          setup:
            - "pinMode(LED_BUILTIN, OUTPUT);"
          body:
            - "digitalWrite(LED_BUILTIN, {{STATE}});"
