# yaml-language-server: $schema=https://raw.githubusercontent.com/linucs/vscode-blockly/refs/heads/main/src/catalog/block-catalog_v1.schema.json
id: arduino_code_setup
docs:
  reference: "https://docs.arduino.cc/language-reference/"
category: Control
colour: "#78909C"
implementations:
  - runtime: arduino:cpp
    blocks:
      - blockly:
          type: code_setup
          message0:
            en: "setup %1"
            it: "setup %1"
          args0:
            - type: input_statement
              name: MEMBERS
          tooltip:
            en: "Blocks inside run once at startup, in setup(). Use for begin()/init calls and pinMode()."
            it: "I blocchi all'interno vengono eseguiti una sola volta all'avvio, in setup(). Usalo per le chiamate begin()/init e pinMode()."
        generator: code_setup
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/linucs/vscode-blockly/refs/heads/main/src/catalog/block-catalog_v1.schema.json
id: arduino_constants
category: Control
implementations:
  - runtime: arduino:cpp
    blocks:
      - blockly:
          type: cpp_constant
          message0:
            en: "%1"
            it: "%1"
          args0:
            - type: field_dropdown
              name: CONST
              options:
                - ["HIGH", "HIGH"]
                - ["LOW", "LOW"]
                - ["INPUT", "INPUT"]
                - ["OUTPUT", "OUTPUT"]
                - ["INPUT_PULLUP", "INPUT_PULLUP"]
                - ["LED_BUILTIN", "LED_BUILTIN"]
          output: null
          tooltip:
            en: "An Arduino named constant: HIGH/LOW, pin modes (INPUT/OUTPUT/INPUT_PULLUP), or LED_BUILTIN."
            it: "Una costante Arduino: HIGH/LOW, modalità pin (INPUT/OUTPUT/INPUT_PULLUP) o LED_BUILTIN."
          helpUrl: "https://docs.arduino.cc/language-reference/en/variables/constants/highLow/"
        codegen:
          body:
            - "{{CONST}}"
          precedence: ATOMIC
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/linucs/vscode-blockly/refs/heads/main/src/catalog/block-catalog_v1.schema.json
id: arduino_builtin_led
category: Control
implementations:
  - runtime: arduino:cpp
    blocks:
      - blockly:
          type: cpp_led_builtin
          message0:
            en: "turn built-in LED %1"
            it: "imposta LED integrato %1"
          args0:
            - type: field_dropdown
              name: STATE
              options:
                - ["on", "HIGH"]
                - ["off", "LOW"]
          previousStatement: null
          nextStatement: null
          tooltip:
            en: "Turn the board's built-in LED on or off. Sets LED_BUILTIN to OUTPUT in setup automatically."
            it: "Accendi o spegni il LED integrato della scheda. Imposta automaticamente LED_BUILTIN come OUTPUT nel setup."
          helpUrl: "https://docs.arduino.cc/built-in-examples/basics/Blink/"
        codegen:
          setup:
            - "pinMode(LED_BUILTIN, OUTPUT);"
          body:
            - "digitalWrite(LED_BUILTIN, {{STATE}});"
