# yaml-language-server: $schema=https://raw.githubusercontent.com/linucs/vscode-blockly/refs/heads/main/src/catalog/block-catalog_v1.schema.json
id: arduino_digital_io
category: "Input / Output::Digital"
colour: "#FFB300"
implementations:
  - runtime: "arduino:cpp"
    blocks:
      # --- pinMode (setup-only) ---
      - blockly:
          type: cpp_pin_mode
          message0:
            en: "pinMode pin %1 mode %2"
            it: "pinMode pin %1 modalità %2"
          args0:
            - type: input_value
              name: PIN
              check: ["Number", "int", "unsigned int", "long", "unsigned long", "byte", "word", "uint8_t", "uint16_t", "uint32_t", "int8_t", "int16_t", "int32_t"]
            - type: field_dropdown
              name: MODE
              options:
                - ["INPUT", "INPUT"]
                - ["OUTPUT", "OUTPUT"]
                - ["INPUT_PULLUP", "INPUT_PULLUP"]
          previousStatement: null
          nextStatement: null
          inputsInline: true
          tooltip:
            en: "Configure a digital pin as INPUT, OUTPUT, or INPUT_PULLUP. Place inside a 'setup' block to run once at startup."
            it: "Configura un pin digitale come INPUT, OUTPUT o INPUT_PULLUP. Posiziona dentro un blocco 'setup' per eseguire una sola volta all'avvio."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/digital-io/pinMode/"
        codegen:
          body:
            - "pinMode({{PIN}}, {{MODE}});"
          inputDefaults:
            PIN: "13"

      # --- digitalWrite ---
      - blockly:
          type: cpp_digital_write
          message0:
            en: "digitalWrite pin %1 %2"
            it: "digitalWrite pin %1 %2"
          args0:
            - type: input_value
              name: PIN
              check: ["Number", "int", "unsigned int", "long", "unsigned long", "byte", "word", "uint8_t", "uint16_t", "uint32_t", "int8_t", "int16_t", "int32_t"]
            - type: field_dropdown
              name: VALUE
              options:
                - ["HIGH", "HIGH"]
                - ["LOW", "LOW"]
          previousStatement: null
          nextStatement: null
          inputsInline: true
          tooltip:
            en: "Write HIGH or LOW to a digital pin."
            it: "Scrivi HIGH o LOW su un pin digitale."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/digital-io/digitalWrite/"
        codegen:
          body:
            - "digitalWrite({{PIN}}, {{VALUE}});"
          inputDefaults:
            PIN: "13"

      # --- digitalRead ---
      - blockly:
          type: cpp_digital_read
          message0:
            en: "digitalRead pin %1"
            it: "digitalRead pin %1"
          args0:
            - type: input_value
              name: PIN
              check: ["Number", "int", "unsigned int", "long", "unsigned long", "byte", "word", "uint8_t", "uint16_t", "uint32_t", "int8_t", "int16_t", "int32_t"]
          output: Number
          inputsInline: true
          tooltip:
            en: "Read the value from a digital pin (HIGH or LOW)."
            it: "Leggi il valore da un pin digitale (HIGH o LOW)."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/digital-io/digitalRead/"
        codegen:
          body:
            - "digitalRead({{PIN}})"
          precedence: ATOMIC
          inputDefaults:
            PIN: "2"
