            de: "Liest die nächste Ganzzahl (parseInt) oder Gleitkommazahl (parseFloat) aus dem seriellen Eingabepuffer."
            es: "Lee el próximo entero (parseInt) o número de punto flotante (parseFloat) del búfer de entrada serie."
            ja: "シリアル入力バッファから次の整数（parseInt）または浮動小数点数（parseFloat）を読み取ります。"
            ko: "시리얼 입력 버퍼에서 다음 정수(parseInt) 또는 부동소수점 수(parseFloat)를 읽습니다."
            ru: "Читает следующее целое число (parseInt) или число с плавающей запятой (parseFloat) из входного буфера последовательного порта."
            pt-br: "Lê o próximo inteiro (parseInt) ou número de ponto flutuante (parseFloat) do buffer de entrada serial."
            tr: "Seri giriş tamponundan sonraki tamsayıyı (parseInt) veya kayan noktalı sayıyı (parseFloat) okur."
            pl: "Odczytuje następną liczbę całkowitą (parseInt) lub zmiennoprzecinkową (parseFloat) z bufora wejściowego portu szeregowego."
            cs: "Přečte další celé číslo (parseInt) nebo číslo s plovoucí řádovou čárkou (parseFloat) ze vstupního bufferu sériového portu."
            hu: "A következő egész számot (parseInt) vagy lebegőpontos számot (parseFloat) olvassa be a soros port bemeneti pufferéből."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/serial/parseInt/"
