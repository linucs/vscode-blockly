          tooltip:
            en: "Return the next byte of incoming Serial data without removing it from the buffer (-1 if none)."
            it: "Restituisce il prossimo byte dei dati seriali in arrivo senza rimuoverlo dal buffer (-1 se non presente)."
            zh-cn: "返回串口接收数据的下一个字节，但不从缓冲区中移除（如果没有则返回 -1）。"
            zh-tw: "傳回序列埠接收資料的下一個位元組，但不從緩衝區中移除（如果沒有則傳回 -1）。"
            fr: "Renvoie le prochain octet des données série entrantes sans le retirer du tampon (-1 si aucun)."
            de: "Gibt das nächste Byte der eingehenden seriellen Daten zurück, ohne es aus dem Puffer zu entfernen (-1 wenn keines vorhanden)."
            es: "Devuelve el próximo byte de los datos serie entrantes sin eliminarlo del búfer (-1 si no hay ninguno)."
            ja: "受信シリアルデータの次のバイトをバッファから削除せずに返します（なければ -1）。"
            ko: "수신된 시리얼 데이터의 다음 바이트를 버퍼에서 제거하지 않고 반환합니다(없으면 -1)."
            ru: "Возвращает следующий байт входящих данных последовательного порта, не удаляя его из буфера (-1, если нет данных)."
            pt-br: "Retorna o próximo byte dos dados seriais recebidos sem removê-lo do buffer (-1 se não houver nenhum)."
            tr: "Gelen seri verinin sonraki baytını tampondan kaldırmadan döndürür (yoksa -1)."
            pl: "Zwraca następny bajt przychodzących danych szeregowych bez usuwania go z bufora (-1 jeśli brak)."
            cs: "Vrátí další bajt příchozích sériových dat bez jeho odebrání z bufferu (-1, pokud žádný není)."
            hu: "A bejövő soros adatok következő bájtját adja vissza anélkül, hogy eltávolítaná a pufferből (-1, ha nincs)."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/serial/peek/"
        codegen:
          body:
            - "Serial.peek()"
          precedence: ATOMIC

