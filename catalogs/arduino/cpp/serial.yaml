            ja: "終端文字が見つかるまで（またはタイムアウトまで）シリアルバッファから文字を読み取り、文字列に格納します。"
            ko: "종료 문자를 찾을 때까지(또는 타임아웃까지) 시리얼 버퍼에서 문자를 읽어 문자열로 반환합니다."
            ru: "Читает символы из буфера последовательного порта в строку, пока не будет найден символ-терминатор (или не истечёт тайм-аут)."
            pt-br: "Lê caracteres do buffer serial para uma String até encontrar o caractere terminador (ou até o tempo limite)."
            tr: "Sonlandırıcı karakter bulunana kadar (veya zaman aşımına kadar) seri tampondan karakterleri bir dizgeye okur."
            pl: "Odczytuje znaki z bufora szeregowego do łańcucha znaków, aż zostanie znaleziony znak terminatora (lub upłynie limit czasu)."
            cs: "Čte znaky ze sériového bufferu do řetězce, dokud není nalezen ukončovací znak (nebo nevyprší časový limit)."
            hu: "Karaktereket olvas a soros pufferből egy karakterláncba, amíg meg nem találja a lezáró karaktert (vagy időtúllépés)."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/serial/readStringUntil/"
        codegen:
          body:
            - "Serial.readStringUntil({{TERMINATOR}})"
          precedence: ATOMIC
          inputDefaults:
            TERMINATOR: "'\\n'"

