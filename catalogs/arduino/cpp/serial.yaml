# Built-in catalog — Serial (arduino:cpp).
# Ported from arduino-app-lab (cpp_serial.yaml, tested), adapted to this repo:
#  - category renamed "Messaging::Serial" -> "Communication::Serial" (groups
#    Serial/SPI/I2C under Communication, matching the Arduino reference).
#  - WYSIWYG: Serial.begin and Serial.setTimeout moved from codegen.setup to
#    codegen.body — the user places them inside a `code_setup` container; no
#    automatic routing to setup().
#  - normalized helpUrl/docs base to docs.arduino.cc.
#  - NOTE (App Lab looseness, kept as-is): Serial.readString returns String and
#    Serial.find returns bool, but both keep output: null (untyped) like the rest
#    of this repo's value blocks — lenient, connects anywhere.
id: arduino_serial
category: "Communication::Serial"
docs:
  library: "https://docs.arduino.cc/language-reference/en/functions/communication/serial/"
implementations:
  - runtime: "arduino:cpp"
    blocks:
      # --- Serial.begin (place in a setup block) ---
      - blockly:
          type: cpp_serial_begin
          message0:
            en: "Serial.begin %1 baud"
            it: "Serial.begin %1 baud"
          args0:
            - type: field_dropdown
              name: BAUD
              options:
                - ["9600", "9600"]
                - ["19200", "19200"]
                - ["57600", "57600"]
                - ["115200", "115200"]
                - ["230400", "230400"]
          previousStatement: null
          nextStatement: null
          tooltip:
            en: "Initialize Serial communication at the given baud rate. Place inside a 'setup' block to run once at startup."
            it: "Inizializza la comunicazione seriale alla velocita' di trasmissione indicata. Posiziona dentro un blocco 'setup' per eseguire una sola volta all'avvio."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/serial/begin/"
        codegen:
          body:
            - "Serial.begin({{BAUD}});"

      # --- Serial.print / println (consolidated, dropdown) ---
      - blockly:
          type: cpp_serial_print
          message0:
            en: "Serial %1 %2"
            it: "Serial %1 %2"
          args0:
            - type: field_dropdown
              name: FUNC
              options:
                - ["print", "print"]
                - ["print line", "println"]
            - type: input_value
              name: VALUE
          previousStatement: null
          nextStatement: null
          inputsInline: true
          tooltip:
            en: "Print a value to the Serial port. 'print line' (println) adds a trailing newline."
            it: "Stampa un valore sulla porta seriale. 'print line' (println) aggiunge un ritorno a capo finale."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/serial/print/"
        codegen:
          body:
            - "Serial.{{FUNC}}({{VALUE}});"
          inputDefaults:
            VALUE: '""'

      # --- Serial.write ---
      - blockly:
          type: cpp_serial_write
          message0:
            en: "Serial.write %1"
            it: "Serial.write %1"
          args0:
            - type: input_value
              name: VALUE
              check: ["Number", "int", "unsigned int", "long", "unsigned long", "byte", "word", "uint8_t", "uint16_t", "uint32_t", "int8_t", "int16_t", "int32_t", "String"]
          previousStatement: null
          nextStatement: null
          inputsInline: true
          tooltip:
            en: "Write raw binary data to the Serial port."
            it: "Scrivi dati binari grezzi sulla porta seriale."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/serial/write/"
        codegen:
          body:
            - "Serial.write({{VALUE}});"
          inputDefaults:
            VALUE: "0"

      # --- Serial.available ---
      - blockly:
          type: cpp_serial_available
          message0:
            en: "Serial.available"
            it: "Serial.available"
          args0: []
          output: Number
          tooltip:
            en: "Return the number of bytes available to read from the Serial port."
            it: "Restituisce il numero di byte disponibili da leggere dalla porta seriale."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/serial/available/"
        codegen:
          body:
            - "Serial.available()"
          precedence: ATOMIC

      # --- Serial.read ---
      - blockly:
          type: cpp_serial_read
          message0:
            en: "Serial.read"
            it: "Serial.read"
          args0: []
          output: Number
          tooltip:
            en: "Read the first byte from the Serial input buffer."
            it: "Leggi il primo byte dal buffer di ingresso della porta seriale."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/serial/read/"
        codegen:
          body:
            - "Serial.read()"
          precedence: ATOMIC

      # --- Serial.peek ---
      - blockly:
          type: cpp_serial_peek
          message0:
            en: "Serial.peek"
            it: "Serial.peek"
          args0: []
          output: Number
          tooltip:
            en: "Return the next byte of incoming Serial data without removing it from the buffer (-1 if none)."
            it: "Restituisce il prossimo byte dei dati seriali in arrivo senza rimuoverlo dal buffer (-1 se non presente)."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/serial/peek/"
        codegen:
          body:
            - "Serial.peek()"
          precedence: ATOMIC

      # --- Serial.availableForWrite ---
      - blockly:
          type: cpp_serial_available_for_write
          message0:
            en: "Serial.availableForWrite"
            it: "Serial.availableForWrite"
          args0: []
          output: Number
          tooltip:
            en: "Return the number of bytes that can be written to the Serial transmit buffer without blocking."
            it: "Restituisce il numero di byte che possono essere scritti nel buffer di trasmissione seriale senza bloccare."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/serial/availableForWrite/"
        codegen:
          body:
            - "Serial.availableForWrite()"
          precedence: ATOMIC

      # --- Serial.readString ---
      - blockly:
          type: cpp_serial_read_string
          message0:
            en: "Serial.readString"
            it: "Serial.readString"
          args0: []
          output: null
          tooltip:
            en: "Read characters from the Serial buffer into a String until timeout."
            it: "Leggi i caratteri dal buffer seriale in una stringa fino al timeout."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/serial/readString/"
        codegen:
          body:
            - "Serial.readString()"
          precedence: ATOMIC

      # --- Serial.readStringUntil ---
      - blockly:
          type: cpp_serial_read_string_until
          message0:
            en: "Serial.readStringUntil %1"
            it: "Serial.readStringUntil %1"
          args0:
            - type: input_value
              name: TERMINATOR
          output: null
          inputsInline: true
          tooltip:
            en: "Read characters from the Serial buffer into a String until the terminator character is found (or timeout)."
            it: "Leggi i caratteri dal buffer seriale in una stringa fino a quando viene trovato il carattere terminatore (o al timeout)."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/serial/readStringUntil/"
        codegen:
          body:
            - "Serial.readStringUntil({{TERMINATOR}})"
          precedence: ATOMIC
          inputDefaults:
            TERMINATOR: "'\\n'"

      # --- Serial.parseInt / parseFloat (consolidated, dropdown) ---
      - blockly:
          type: cpp_serial_parse
          message0:
            en: "Serial.parse %1"
            it: "Serial.parse %1"
          args0:
            - type: field_dropdown
              name: FUNC
              options:
                - ["integer", "parseInt"]
                - ["float", "parseFloat"]
          output: Number
          tooltip:
            en: "Read the next integer (parseInt) or floating-point number (parseFloat) from the Serial input buffer."
            it: "Leggi il prossimo intero (parseInt) o numero in virgola mobile (parseFloat) dal buffer di ingresso seriale."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/serial/parseInt/"
        codegen:
          body:
            - "Serial.{{FUNC}}()"
          precedence: ATOMIC

      # --- Serial.find ---
      - blockly:
          type: cpp_serial_find
          message0:
            en: "Serial.find %1"
            it: "Serial.find %1"
          args0:
            - type: input_value
              name: TARGET
          output: null
          inputsInline: true
          tooltip:
            en: "Search the Serial buffer for a target string. Returns true if found."
            it: "Cerca una stringa obiettivo nel buffer seriale. Restituisce true se trovata."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/serial/find/"
        codegen:
          body:
            - "Serial.find({{TARGET}})"
          precedence: ATOMIC
          inputDefaults:
            TARGET: '""'

      # --- Serial.findUntil ---
      - blockly:
          type: cpp_serial_find_until
          message0:
            en: "Serial.findUntil target %1 terminator %2"
            it: "Serial.findUntil obiettivo %1 terminatore %2"
          args0:
            - type: input_value
              name: TARGET
            - type: input_value
              name: TERMINAL
          output: null
          inputsInline: true
          tooltip:
            en: "Read from the Serial buffer until the target string is found or the terminator string is reached."
            it: "Leggi dal buffer seriale fino a quando viene trovata la stringa obiettivo o viene raggiunta la stringa terminatore."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/serial/findUntil/"
        codegen:
          body:
            - "Serial.findUntil({{TARGET}}, {{TERMINAL}})"
          precedence: ATOMIC
          inputDefaults:
            TARGET: '""'
            TERMINAL: '""'

      # --- Serial.setTimeout (place in a setup block) ---
      - blockly:
          type: cpp_serial_set_timeout
          message0:
            en: "Serial.setTimeout %1 ms"
            it: "Serial.setTimeout %1 ms"
          args0:
            - type: input_value
              name: MS
              check: ["Number", "int", "unsigned int", "long", "unsigned long", "byte", "word", "uint8_t", "uint16_t", "uint32_t", "int8_t", "int16_t", "int32_t"]
          previousStatement: null
          nextStatement: null
          inputsInline: true
          tooltip:
            en: "Set the timeout for Serial read operations. Place inside a 'setup' block to run once at startup."
            it: "Imposta il timeout per le operazioni di lettura seriale. Posiziona dentro un blocco 'setup' per eseguire una sola volta all'avvio."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/serial/setTimeout/"
        codegen:
          body:
            - "Serial.setTimeout({{MS}});"
          inputDefaults:
            MS: "1000"

      # --- Serial.getTimeout ---
      - blockly:
          type: cpp_serial_get_timeout
          message0:
            en: "Serial.getTimeout"
            it: "Serial.getTimeout"
          args0: []
          output: Number
          tooltip:
            en: "Return the current timeout (ms) for Serial read operations."
            it: "Restituisce il timeout corrente (ms) per le operazioni di lettura seriale."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/serial/getTimeout/"
        codegen:
          body:
            - "Serial.getTimeout()"
          precedence: ATOMIC

      # --- Serial.flush ---
      - blockly:
          type: cpp_serial_flush
          message0:
            en: "Serial.flush"
            it: "Serial.flush"
          args0: []
          previousStatement: null
          nextStatement: null
          tooltip:
            en: "Wait for outgoing Serial data to finish sending."
            it: "Attendi che i dati seriali in uscita finiscano di essere inviati."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/serial/flush/"
        codegen:
          body:
            - "Serial.flush();"

      # --- Serial.end ---
      - blockly:
          type: cpp_serial_end
          message0:
            en: "Serial.end"
            it: "Serial.end"
          args0: []
          previousStatement: null
          nextStatement: null
          tooltip:
            en: "Disable the Serial port."
            it: "Disabilita la porta seriale."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/serial/end/"
        codegen:
          body:
            - "Serial.end();"
