            cs: "Serial.available"
            hu: "Serial.available"
          args0: []
          output: Number
          tooltip:
            en: "Return the number of bytes available to read from the Serial port."
            it: "Restituisce il numero di byte disponibili da leggere dalla porta seriale."
            zh-cn: "返回串口中可读取的字节数。"
            zh-tw: "傳回序列埠中可讀取的位元組數。"
            fr: "Renvoie le nombre d'octets disponibles en lecture sur le port série."
            de: "Gibt die Anzahl der zum Lesen verfügbaren Bytes auf der seriellen Schnittstelle zurück."
            es: "Devuelve el número de bytes disponibles para leer del puerto serie."
            ja: "シリアルポートから読み取り可能なバイト数を返します。"
            ko: "시리얼 포트에서 읽을 수 있는 바이트 수를 반환합니다."
            ru: "Возвращает количество байт, доступных для чтения из последовательного порта."
            pt-br: "Retorna o número de bytes disponíveis para leitura na porta serial."
            tr: "Seri porttan okunabilecek bayt sayısını döndürür."
            pl: "Zwraca liczbę bajtów dostępnych do odczytu z portu szeregowego."
            cs: "Vrátí počet bajtů dostupných ke čtení ze sériového portu."
            hu: "A soros portról olvasható bájtok számát adja vissza."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/serial/available/"
        codegen:
          body:
            - "Serial.available()"
          precedence: ATOMIC

