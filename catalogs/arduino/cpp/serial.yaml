            fr: "Définit le délai d'attente pour les opérations de lecture série. Placer dans un bloc 'setup' pour l'exécuter une seule fois au démarrage."
            de: "Legt das Timeout für serielle Leseoperationen fest. In einen 'setup'-Block setzen, um einmalig beim Start auszuführen."
            es: "Establece el tiempo de espera para las operaciones de lectura serie. Colocar dentro de un bloque 'setup' para ejecutar una sola vez al inicio."
            ja: "シリアル読み取り操作のタイムアウトを設定します。起動時に一度だけ実行するには 'setup' ブロック内に配置してください。"
            ko: "시리얼 읽기 작업의 타임아웃을 설정합니다. 시작 시 한 번 실행하려면 'setup' 블록 안에 배치하세요."
            ru: "Устанавливает тайм-аут для операций чтения последовательного порта. Поместите внутрь блока 'setup' для однократного выполнения при запуске."
            pt-br: "Define o tempo limite para operações de leitura serial. Coloque dentro de um bloco 'setup' para executar uma vez na inicialização."
            tr: "Seri okuma işlemleri için zaman aşımını ayarlar. Başlangıçta bir kez çalıştırmak için 'setup' bloğunun içine yerleştirin."
            pl: "Ustawia limit czasu dla operacji odczytu z portu szeregowego. Umieść w bloku 'setup', aby wykonać raz przy uruchomieniu."
            cs: "Nastaví časový limit pro operace čtení ze sériového portu. Umístěte do bloku 'setup' pro jednorázové spuštění při startu."
            hu: "Beállítja a soros olvasási műveletek időtúllépését. Helyezze egy 'setup' blokkba, hogy az indításkor egyszer fusson le."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/serial/setTimeout/"
        codegen:
          body:
            - "Serial.setTimeout({{MS}});"
          inputDefaults:
            MS: "1000"

