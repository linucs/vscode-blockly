# yaml-language-server: $schema=https://raw.githubusercontent.com/linucs/vscode-blockly/refs/heads/main/src/catalog/block-catalog_v1.schema.json
id: arduino_serial
category: "Communication::Serial"
colour: "#5C6BC0"
docs:
  library: "https://docs.arduino.cc/language-reference/en/functions/communication/serial/"
implementations:
  - runtime: "arduino:cpp"
    blocks:
      # --- Serial.begin (place in a setup block) ---
      - blockly:
          type: cpp_serial_begin
          message0:
            en: "Serial.begin %1 baud"
            it: "Serial.begin %1 baud"
            zh-cn: "Serial.begin %1 波特率"
            zh-tw: "Serial.begin %1 鮑率"
            fr: "Serial.begin %1 bauds"
            de: "Serial.begin %1 Baud"
            es: "Serial.begin %1 baudios"
            ja: "Serial.begin %1 ボー"
            ko: "Serial.begin %1 보드레이트"
            ru: "Serial.begin %1 бод"
            pt-br: "Serial.begin %1 baud"
            tr: "Serial.begin %1 baud"
            pl: "Serial.begin %1 bodów"
            cs: "Serial.begin %1 baudů"
            hu: "Serial.begin %1 baud"
          args0:
            - type: field_dropdown
              name: BAUD
              options:
                - ["9600", "9600"]
                - ["19200", "19200"]
                - ["57600", "57600"]
                - ["115200", "115200"]
                - ["230400", "230400"]
          previousStatement: null
          nextStatement: null
          tooltip:
            en: "Initialize Serial communication at the given baud rate. Place inside a 'setup' block to run once at startup."
            it: "Inizializza la comunicazione seriale alla velocita' di trasmissione indicata. Posiziona dentro un blocco 'setup' per eseguire una sola volta all'avvio."
            zh-cn: "以指定的波特率初始化串口通信。放在 'setup' 块中以在启动时执行一次。"
            zh-tw: "以指定的鮑率初始化序列通訊。放在 'setup' 區塊中以在啟動時執行一次。"
            fr: "Initialise la communication série au débit en bauds donné. Placer dans un bloc 'setup' pour l'exécuter une seule fois au démarrage."
            de: "Initialisiert die serielle Kommunikation mit der angegebenen Baudrate. In einen 'setup'-Block setzen, um einmalig beim Start auszuführen."
            es: "Inicializa la comunicación serie a la velocidad en baudios indicada. Colocar dentro de un bloque 'setup' para ejecutar una sola vez al inicio."
            ja: "指定されたボーレートでシリアル通信を初期化します。起動時に一度だけ実行するには 'setup' ブロック内に配置してください。"
            ko: "지정된 보드레이트로 시리얼 통신을 초기화합니다. 시작 시 한 번 실행하려면 'setup' 블록 안에 배치하세요."
            ru: "Инициализирует последовательную связь с заданной скоростью передачи. Поместите внутрь блока 'setup' для однократного выполнения при запуске."
            pt-br: "Inicializa a comunicação serial na taxa de transmissão indicada. Coloque dentro de um bloco 'setup' para executar uma vez na inicialização."
            tr: "Belirtilen baud hızında seri iletişimi başlatır. Başlangıçta bir kez çalıştırmak için 'setup' bloğunun içine yerleştirin."
            pl: "Inicjalizuje komunikację szeregową z podaną prędkością transmisji. Umieść w bloku 'setup', aby wykonać raz przy uruchomieniu."
            cs: "Inicializuje sériovou komunikaci při dané přenosové rychlosti. Umístěte do bloku 'setup' pro jednorázové spuštění při startu."
            hu: "Inicializálja a soros kommunikációt a megadott átviteli sebességgel. Helyezze egy 'setup' blokkba, hogy az indításkor egyszer fusson le."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/serial/begin/"
        codegen:
          body:
            - "Serial.begin({{BAUD}});"

      # --- Serial.print / println (consolidated, dropdown) ---
      - blockly:
          type: cpp_serial_print
          message0:
            en: "Serial %1 %2"
            it: "Serial %1 %2"
            zh-cn: "Serial %1 %2"
            zh-tw: "Serial %1 %2"
            fr: "Serial %1 %2"
            de: "Serial %1 %2"
            es: "Serial %1 %2"
            ja: "Serial %1 %2"
            ko: "Serial %1 %2"
            ru: "Serial %1 %2"
            pt-br: "Serial %1 %2"
            tr: "Serial %1 %2"
            pl: "Serial %1 %2"
            cs: "Serial %1 %2"
            hu: "Serial %1 %2"
          args0:
            - type: field_dropdown
              name: FUNC
              options:
                - ["print", "print"]
                - ["print line", "println"]
            - type: input_value
              name: VALUE
          previousStatement: null
          nextStatement: null
          inputsInline: true
          tooltip:
            en: "Print a value to the Serial port. 'print line' (println) adds a trailing newline."
            it: "Stampa un valore sulla porta seriale. 'print line' (println) aggiunge un ritorno a capo finale."
            zh-cn: "将值打印到串口。'print line'（println）会添加换行符。"
            zh-tw: "將值列印到序列埠。'print line'（println）會添加換行符。"
            fr: "Affiche une valeur sur le port série. 'print line' (println) ajoute un saut de ligne final."
            de: "Gibt einen Wert auf der seriellen Schnittstelle aus. 'print line' (println) fügt einen Zeilenumbruch am Ende hinzu."
            es: "Imprime un valor en el puerto serie. 'print line' (println) agrega un salto de línea al final."
            ja: "シリアルポートに値を出力します。'print line'（println）は末尾に改行を追加します。"
            ko: "시리얼 포트에 값을 출력합니다. 'print line'(println)은 끝에 줄바꿈을 추가합니다."
            ru: "Выводит значение в последовательный порт. 'print line' (println) добавляет перевод строки в конце."
            pt-br: "Imprime um valor na porta serial. 'print line' (println) adiciona uma quebra de linha no final."
            tr: "Seri porta bir değer yazdırır. 'print line' (println) sonuna yeni satır ekler."
            pl: "Wypisuje wartość na port szeregowy. 'print line' (println) dodaje znak nowej linii na końcu."
            cs: "Vypíše hodnotu na sériový port. 'print line' (println) přidá na konec nový řádek."
            hu: "Kiír egy értéket a soros portra. A 'print line' (println) sortörést fűz a végére."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/serial/print/"
        codegen:
          body:
            - "Serial.{{FUNC}}({{VALUE}});"
          inputDefaults:
            VALUE: '""'

      # --- Serial.write ---
      - blockly:
          type: cpp_serial_write
          message0:
            en: "Serial.write %1"
            it: "Serial.write %1"
            zh-cn: "Serial.write %1"
            zh-tw: "Serial.write %1"
            fr: "Serial.write %1"
            de: "Serial.write %1"
            es: "Serial.write %1"
            ja: "Serial.write %1"
            ko: "Serial.write %1"
            ru: "Serial.write %1"
            pt-br: "Serial.write %1"
            tr: "Serial.write %1"
            pl: "Serial.write %1"
            cs: "Serial.write %1"
            hu: "Serial.write %1"
          args0:
            - type: input_value
              name: VALUE
              check: ["Number", "int", "unsigned int", "long", "unsigned long", "byte", "word", "uint8_t", "uint16_t", "uint32_t", "int8_t", "int16_t", "int32_t", "String"]
          previousStatement: null
          nextStatement: null
          inputsInline: true
          tooltip:
            en: "Write raw binary data to the Serial port."
            it: "Scrivi dati binari grezzi sulla porta seriale."
            zh-cn: "将原始二进制数据写入串口。"
            zh-tw: "將原始二進位資料寫入序列埠。"
            fr: "Écrit des données binaires brutes sur le port série."
            de: "Schreibt rohe Binärdaten auf die serielle Schnittstelle."
            es: "Escribe datos binarios sin procesar en el puerto serie."
            ja: "シリアルポートに生のバイナリデータを書き込みます。"
            ko: "시리얼 포트에 원시 바이너리 데이터를 씁니다."
            ru: "Записывает необработанные двоичные данные в последовательный порт."
            pt-br: "Escreve dados binários brutos na porta serial."
            tr: "Seri porta ham ikili veri yazar."
            pl: "Zapisuje surowe dane binarne na port szeregowy."
            cs: "Zapíše surová binární data na sériový port."
            hu: "Nyers bináris adatokat ír a soros portra."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/serial/write/"
        codegen:
          body:
            - "Serial.write({{VALUE}});"
          inputDefaults:
            VALUE: "0"

      # --- Serial.available ---
      - blockly:
          type: cpp_serial_available
          message0:
            en: "Serial.available"
            it: "Serial.available"
            zh-cn: "Serial.available"
            zh-tw: "Serial.available"
            fr: "Serial.available"
            de: "Serial.available"
            es: "Serial.available"
            ja: "Serial.available"
            ko: "Serial.available"
