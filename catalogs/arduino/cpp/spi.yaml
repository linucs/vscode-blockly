# yaml-language-server: $schema=https://raw.githubusercontent.com/linucs/vscode-blockly/refs/heads/main/src/catalog/block-catalog_v1.schema.json
id: arduino_spi
category: "Communication::SPI"
implementations:
  - runtime: "arduino:cpp"
    codegen:
      imports:
        - "#include <SPI.h>"
    blocks:
      # --- SPISettings(clock, bitOrder, dataMode) ---
      - blockly:
          type: cpp_spi_settings
          message0:
            en: "SPISettings clock %1 order %2 mode %3"
            it: "SPISettings clock %1 ordine %2 modo %3"
          args0:
            - type: input_value
              name: CLOCK
            - type: field_dropdown
              name: BITORDER
              options:
                - ["MSBFIRST", "MSBFIRST"]
                - ["LSBFIRST", "LSBFIRST"]
            - type: field_dropdown
              name: MODE
              options:
                - ["SPI_MODE0", "SPI_MODE0"]
                - ["SPI_MODE1", "SPI_MODE1"]
                - ["SPI_MODE2", "SPI_MODE2"]
                - ["SPI_MODE3", "SPI_MODE3"]
          output: null
          inputsInline: true
          tooltip:
            en: "Bundle SPI clock speed, bit order, and data mode for use with beginTransaction."
            it: "Raggruppa velocita di clock SPI, ordine dei bit e modalita dati per l'uso con beginTransaction."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/SPI/SPISettings/"
        codegen:
          body:
            - "SPISettings({{CLOCK}}, {{BITORDER}}, {{MODE}})"
          precedence: ATOMIC
          inputDefaults:
            CLOCK: "4000000"

      # --- SPI.begin (place in a setup block) ---
      - blockly:
          type: cpp_spi_begin
          message0:
            en: "SPI.begin"
            it: "SPI.begin"
          args0: []
          previousStatement: null
          nextStatement: null
          tooltip:
            en: "Initialize the SPI bus (SCK, MOSI, SS as output). Place inside a 'setup' block."
            it: "Inizializza il bus SPI (SCK, MOSI, SS come uscita). Posiziona dentro un blocco 'setup'."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/SPI/begin/"
        codegen:
          body:
            - "SPI.begin();"

      # --- SPI.end ---
      - blockly:
          type: cpp_spi_end
          message0:
            en: "SPI.end"
            it: "SPI.end"
          args0: []
          previousStatement: null
          nextStatement: null
          tooltip:
            en: "Disable the SPI bus."
            it: "Disabilita il bus SPI."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/SPI/end/"
        codegen:
          body:
            - "SPI.end();"

      # --- SPI.beginTransaction(settings) ---
      - blockly:
          type: cpp_spi_begin_transaction
          message0:
            en: "SPI.beginTransaction %1"
            it: "SPI.beginTransaction %1"
          args0:
            - type: input_value
              name: SETTINGS
          previousStatement: null
          nextStatement: null
          inputsInline: true
          tooltip:
            en: "Begin using the SPI bus with the given SPISettings (reconfigures and holds the bus)."
            it: "Inizia a utilizzare il bus SPI con le SPISettings fornite (riconfigura e mantiene il bus)."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/SPI/beginTransaction/"
        codegen:
          body:
            - "SPI.beginTransaction({{SETTINGS}});"
          inputDefaults:
            SETTINGS: "SPISettings(4000000, MSBFIRST, SPI_MODE0)"

      # --- SPI.endTransaction ---
      - blockly:
          type: cpp_spi_end_transaction
          message0:
            en: "SPI.endTransaction"
            it: "SPI.endTransaction"
          args0: []
          previousStatement: null
          nextStatement: null
          tooltip:
            en: "Stop using the SPI bus, allowing other libraries to use it."
            it: "Termina l'uso del bus SPI, consentendo ad altre librerie di utilizzarlo."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/SPI/endTransaction/"
        codegen:
          body:
            - "SPI.endTransaction();"

      # --- SPI.transfer / transfer16 (consolidated, dropdown) ---
      - blockly:
          type: cpp_spi_transfer
          message0:
            en: "SPI.transfer %1 %2"
            it: "SPI.transfer %1 %2"
          args0:
            - type: field_dropdown
              name: FUNC
              options:
                - ["8-bit", "transfer"]
                - ["16-bit", "transfer16"]
            - type: input_value
              name: VALUE
          output: Number
          inputsInline: true
          tooltip:
            en: "Simultaneously send and receive one byte (transfer) or 16-bit word (transfer16) over SPI."
            it: "Invia e ricevi simultaneamente un byte (transfer) o una word a 16 bit (transfer16) tramite SPI."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/SPI/transfer/"
        codegen:
          body:
            - "SPI.{{FUNC}}({{VALUE}})"
          precedence: ATOMIC
          inputDefaults:
            VALUE: "0"

      # --- SPI.usingInterrupt(n) ---
      - blockly:
          type: cpp_spi_using_interrupt
          message0:
            en: "SPI.usingInterrupt %1"
            it: "SPI.usingInterrupt %1"
          args0:
            - type: input_value
              name: N
              check: ["Number", "int", "unsigned int", "byte", "word", "uint8_t", "uint16_t", "uint32_t"]
          previousStatement: null
          nextStatement: null
          inputsInline: true
          tooltip:
            en: "Register an interrupt that uses SPI so the library disables it during transactions."
            it: "Registra un interrupt che utilizza SPI in modo che la libreria lo disabiliti durante le transazioni."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/SPI/usingInterrupt/"
        codegen:
          body:
            - "SPI.usingInterrupt({{N}});"
          inputDefaults:
            N: "0"

      # --- SPI.setBitOrder (legacy) ---
      - blockly:
          type: cpp_spi_set_bit_order
          message0:
            en: "SPI.setBitOrder %1"
            it: "SPI.setBitOrder %1"
          args0:
            - type: field_dropdown
              name: ORDER
              options:
                - ["MSBFIRST", "MSBFIRST"]
                - ["LSBFIRST", "LSBFIRST"]
          previousStatement: null
          nextStatement: null
          tooltip:
            en: "(Legacy) Set whether data is shifted MSB- or LSB-first. Prefer SPISettings/beginTransaction."
            it: "(Legacy) Imposta se i dati vengono trasmessi dal bit piu significativo o dal meno significativo. Preferire SPISettings/beginTransaction."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/SPI/setBitOrder/"
        codegen:
          body:
            - "SPI.setBitOrder({{ORDER}});"

      # --- SPI.setClockDivider (legacy) ---
      - blockly:
          type: cpp_spi_set_clock_divider
          message0:
            en: "SPI.setClockDivider %1"
            it: "SPI.setClockDivider %1"
          args0:
            - type: field_dropdown
              name: DIVIDER
              options:
                - ["DIV2", "SPI_CLOCK_DIV2"]
                - ["DIV4", "SPI_CLOCK_DIV4"]
                - ["DIV8", "SPI_CLOCK_DIV8"]
                - ["DIV16", "SPI_CLOCK_DIV16"]
                - ["DIV32", "SPI_CLOCK_DIV32"]
                - ["DIV64", "SPI_CLOCK_DIV64"]
                - ["DIV128", "SPI_CLOCK_DIV128"]
          previousStatement: null
          nextStatement: null
          tooltip:
            en: "(Legacy) Set the SPI clock relative to the system clock. Prefer SPISettings/beginTransaction."
            it: "(Legacy) Imposta il clock SPI rispetto al clock di sistema. Preferire SPISettings/beginTransaction."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/SPI/setClockDivider/"
        codegen:
          body:
            - "SPI.setClockDivider({{DIVIDER}});"

      # --- SPI.setDataMode (legacy) ---
      - blockly:
          type: cpp_spi_set_data_mode
          message0:
            en: "SPI.setDataMode %1"
            it: "SPI.setDataMode %1"
          args0:
            - type: field_dropdown
              name: MODE
              options:
                - ["SPI_MODE0", "SPI_MODE0"]
                - ["SPI_MODE1", "SPI_MODE1"]
                - ["SPI_MODE2", "SPI_MODE2"]
                - ["SPI_MODE3", "SPI_MODE3"]
          previousStatement: null
          nextStatement: null
          tooltip:
            en: "(Legacy) Set clock polarity and phase (SPI modes 0–3). Prefer SPISettings/beginTransaction."
            it: "(Legacy) Imposta polarita e fase del clock (modalita SPI 0-3). Preferire SPISettings/beginTransaction."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/SPI/setDataMode/"
        codegen:
          body:
            - "SPI.setDataMode({{MODE}});"
