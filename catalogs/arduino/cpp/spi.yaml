            pt-br: "(Legado) Define se os dados são enviados MSB ou LSB primeiro. Prefira SPISettings/beginTransaction."
            tr: "(Eski) Verilerin MSB veya LSB öncelikli gönderilip gönderilmeyeceğini ayarlar. SPISettings/beginTransaction tercih edin."
            pl: "(Przestarzałe) Ustawia, czy dane są przesyłane od MSB czy LSB. Zalecane SPISettings/beginTransaction."
            cs: "(Zastaralé) Nastaví, zda se data přenášejí od MSB nebo LSB. Doporučuje se SPISettings/beginTransaction."
            hu: "(Elavult) Beállítja, hogy az adatok MSB- vagy LSB-először kerüljenek átvitelre. Használja inkább a SPISettings/beginTransaction-t."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/SPI/setBitOrder/"
        codegen:
          body:
            - "SPI.setBitOrder({{ORDER}});"

