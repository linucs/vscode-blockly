            es: "Establece el carácter en INDEX, modificando el String directamente. STR debe ser una variable."
            ja: "INDEX の文字を設定し、String をその場で変更します。STR は変数でなければなりません。"
            ko: "INDEX 위치의 문자를 설정하여 String을 직접 수정합니다. STR은 변수여야 합니다."
            ru: "Устанавливает символ в позиции INDEX, изменяя String на месте. STR должна быть переменной."
            pt-br: "Define o caractere em INDEX, modificando a String diretamente. STR deve ser uma variável."
            tr: "INDEX konumundaki karakteri ayarlar, String'i yerinde değiştirir. STR bir değişken olmalıdır."
            pl: "Ustawia znak na pozycji INDEX, modyfikując String w miejscu. STR musi być zmienną."
