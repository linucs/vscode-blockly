# yaml-language-server: $schema=https://raw.githubusercontent.com/linucs/vscode-blockly/refs/heads/main/src/catalog/block-catalog_v1.schema.json
id: arduino_wire
category: "Communication::I2C"
docs:
  library: "https://docs.arduino.cc/language-reference/en/functions/communication/wire/"
implementations:
  - runtime: "arduino:cpp"
    codegen:
      imports:
        - "#include <Wire.h>"
    blocks:
      # --- Wire.begin([address]) (place in a setup block) ---
      - blockly:
          type: cpp_wire_begin
          message0:
            en: "Wire.begin %1"
            it: "Wire.begin %1"
            zh-cn: "Wire.begin %1"
            zh-tw: "Wire.begin %1"
            fr: "Wire.begin %1"
            de: "Wire.begin %1"
            es: "Wire.begin %1"
            ja: "Wire.begin %1"
            ko: "Wire.begin %1"
            ru: "Wire.begin %1"
            pt-br: "Wire.begin %1"
            tr: "Wire.begin %1"
            pl: "Wire.begin %1"
            cs: "Wire.begin %1"
            hu: "Wire.begin %1"
          args0:
            - type: input_value
              name: ADDRESS
          previousStatement: null
          nextStatement: null
          inputsInline: true
          tooltip:
            en: "Join the I2C bus. No address = controller; with an address = peripheral. Place inside a 'setup' block."
            it: "Entra nel bus I2C. Senza indirizzo = controller; con indirizzo = periferica. Posiziona dentro un blocco 'setup'."
            zh-cn: "加入 I2C 总线。无地址 = 控制器；有地址 = 外设。放在 'setup' 块内。"
            zh-tw: "加入 I2C 匯流排。無地址 = 控制器；有地址 = 外設。放在 'setup' 區塊內。"
            fr: "Rejoindre le bus I2C. Sans adresse = contrôleur ; avec adresse = périphérique. Placer dans un bloc 'setup'."
            de: "I2C-Bus beitreten. Ohne Adresse = Controller; mit Adresse = Peripheriegerät. In einen 'setup'-Block setzen."
            es: "Unirse al bus I2C. Sin dirección = controlador; con dirección = periférico. Colocar dentro de un bloque 'setup'."
            ja: "I2C バスに参加します。アドレスなし = コントローラー、アドレスあり = ペリフェラル。'setup' ブロック内に配置してください。"
            ko: "I2C 버스에 참가합니다. 주소 없음 = 컨트롤러, 주소 있음 = 주변장치. 'setup' 블록 안에 배치하세요."
            ru: "Подключиться к шине I2C. Без адреса = контроллер; с адресом = периферия. Поместите в блок 'setup'."
            pt-br: "Entrar no barramento I2C. Sem endereço = controlador; com endereço = periférico. Colocar dentro de um bloco 'setup'."
            tr: "I2C veri yoluna katıl. Adres yok = denetleyici; adres var = çevre birimi. 'setup' bloğunun içine yerleştirin."
            pl: "Dołącz do magistrali I2C. Bez adresu = kontroler; z adresem = urządzenie peryferyjne. Umieść w bloku 'setup'."
            cs: "Připojit se ke sběrnici I2C. Bez adresy = řadič; s adresou = periferie. Umístěte do bloku 'setup'."
            hu: "Csatlakozás az I2C buszhoz. Cím nélkül = vezérlő; címmel = periféria. Helyezd egy 'setup' blokkba."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/wire/begin/"
        codegen:
          body:
            - "Wire.begin({{ADDRESS}});"
          inputDefaults:
            ADDRESS: ""

      # --- Wire.end ---
      - blockly:
          type: cpp_wire_end
          message0:
            en: "Wire.end"
            it: "Wire.end"
            zh-cn: "Wire.end"
            zh-tw: "Wire.end"
            fr: "Wire.end"
            de: "Wire.end"
            es: "Wire.end"
            ja: "Wire.end"
            ko: "Wire.end"
            ru: "Wire.end"
            pt-br: "Wire.end"
            tr: "Wire.end"
            pl: "Wire.end"
            cs: "Wire.end"
            hu: "Wire.end"
          args0: []
          previousStatement: null
          nextStatement: null
          tooltip:
            en: "Disable the Wire library and release the I2C bus."
            it: "Disabilita la libreria Wire e rilascia il bus I2C."
            zh-cn: "禁用 Wire 库并释放 I2C 总线。"
            zh-tw: "停用 Wire 函式庫並釋放 I2C 匯流排。"
            fr: "Désactiver la bibliothèque Wire et libérer le bus I2C."
            de: "Wire-Bibliothek deaktivieren und den I2C-Bus freigeben."
            es: "Desactivar la biblioteca Wire y liberar el bus I2C."
            ja: "Wire ライブラリを無効にし、I2C バスを解放します。"
            ko: "Wire 라이브러리를 비활성화하고 I2C 버스를 해제합니다."
            ru: "Отключить библиотеку Wire и освободить шину I2C."
            pt-br: "Desativar a biblioteca Wire e liberar o barramento I2C."
            tr: "Wire kütüphanesini devre dışı bırak ve I2C veri yolunu serbest bırak."
            pl: "Wyłącz bibliotekę Wire i zwolnij magistralę I2C."
            cs: "Zakázat knihovnu Wire a uvolnit sběrnici I2C."
            hu: "A Wire könyvtár letiltása és az I2C busz felszabadítása."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/wire/end/"
        codegen:
          body:
            - "Wire.end();"

      # --- Wire.beginTransmission(address) ---
      - blockly:
          type: cpp_wire_begin_transmission
          message0:
            en: "Wire.beginTransmission to %1"
            it: "Wire.beginTransmission a %1"
            zh-cn: "Wire.beginTransmission 到 %1"
            zh-tw: "Wire.beginTransmission 到 %1"
            fr: "Wire.beginTransmission vers %1"
            de: "Wire.beginTransmission an %1"
            es: "Wire.beginTransmission a %1"
            ja: "Wire.beginTransmission 宛先 %1"
            ko: "Wire.beginTransmission 대상 %1"
            ru: "Wire.beginTransmission к %1"
            pt-br: "Wire.beginTransmission para %1"
            tr: "Wire.beginTransmission hedef %1"
            pl: "Wire.beginTransmission do %1"
            cs: "Wire.beginTransmission na %1"
            hu: "Wire.beginTransmission cél %1"
          args0:
            - type: input_value
              name: ADDRESS
              check: ["Number", "int", "unsigned int", "byte", "word", "uint8_t", "uint16_t", "uint32_t"]
          previousStatement: null
          nextStatement: null
          inputsInline: true
          tooltip:
            en: "Begin a queued transmission to the I2C peripheral at the given address."
            it: "Inizia una trasmissione in coda verso la periferica I2C all'indirizzo indicato."
            zh-cn: "开始向指定地址的 I2C 外设进行排队传输。"
            zh-tw: "開始向指定地址的 I2C 外設進行排隊傳輸。"
            fr: "Commencer une transmission en file d'attente vers le périphérique I2C à l'adresse donnée."
            de: "Eine Übertragung an das I2C-Peripheriegerät mit der angegebenen Adresse in die Warteschlange stellen."
            es: "Iniciar una transmisión en cola hacia el periférico I2C en la dirección indicada."
            ja: "指定アドレスの I2C ペリフェラルへのキュー送信を開始します。"
            ko: "지정된 주소의 I2C 주변장치로 대기열 전송을 시작합니다."
            ru: "Начать передачу в очередь к периферии I2C по указанному адресу."
            pt-br: "Iniciar uma transmissão em fila para o periférico I2C no endereço indicado."
            tr: "Belirtilen adresteki I2C çevre birimine kuyruklu iletim başlat."
            pl: "Rozpocznij kolejkowaną transmisję do urządzenia peryferyjnego I2C pod podanym adresem."
            cs: "Zahájit přenos do fronty k periferii I2C na dané adrese."
            hu: "Sorba állított átvitel indítása az adott címen lévő I2C perifériához."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/wire/beginTransmission/"
        codegen:
          body:
            - "Wire.beginTransmission({{ADDRESS}});"
          inputDefaults:
            ADDRESS: "8"

      # --- Wire.endTransmission ---
      - blockly:
          type: cpp_wire_end_transmission
          message0:
            en: "Wire.endTransmission"
            it: "Wire.endTransmission"
            zh-cn: "Wire.endTransmission"
            zh-tw: "Wire.endTransmission"
            fr: "Wire.endTransmission"
            de: "Wire.endTransmission"
            es: "Wire.endTransmission"
            ja: "Wire.endTransmission"
            ko: "Wire.endTransmission"
            ru: "Wire.endTransmission"
            pt-br: "Wire.endTransmission"
            tr: "Wire.endTransmission"
            pl: "Wire.endTransmission"
            cs: "Wire.endTransmission"
            hu: "Wire.endTransmission"
          args0: []
          output: Number
          tooltip:
            en: "Transmit the queued bytes and end the transmission; returns a status code."
            it: "Trasmetti i byte in coda e termina la trasmissione; restituisce un codice di stato."
            zh-cn: "发送排队的字节并结束传输；返回状态码。"
            zh-tw: "傳送排隊的位元組並結束傳輸；回傳狀態碼。"
            fr: "Transmettre les octets en file d'attente et terminer la transmission ; renvoie un code d'état."
            de: "Die wartenden Bytes senden und die Übertragung beenden; gibt einen Statuscode zurück."
            es: "Transmitir los bytes en cola y finalizar la transmisión; devuelve un código de estado."
            ja: "キューに入れたバイトを送信し、送信を終了します。ステータスコードを返します。"
            ko: "대기열의 바이트를 전송하고 전송을 종료합니다. 상태 코드를 반환합니다."
            ru: "Передать байты из очереди и завершить передачу; возвращает код состояния."
            pt-br: "Transmitir os bytes em fila e encerrar a transmissão; retorna um código de status."
            tr: "Kuyruktaki baytları ilet ve iletimi sonlandır; bir durum kodu döndürür."
            pl: "Prześlij bajty z kolejki i zakończ transmisję; zwraca kod statusu."
            cs: "Odeslat bajty z fronty a ukončit přenos; vrací stavový kód."
            hu: "A sorban álló bájtok küldése és az átvitel befejezése; állapotkódot ad vissza."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/wire/endTransmission/"
        codegen:
          body:
            - "Wire.endTransmission()"
          precedence: ATOMIC

      # --- Wire.write(data) ---
