            fr: "Demander des octets à un périphérique ; les lire ensuite avec Wire.available / Wire.read."
            de: "Bytes von einem Peripheriegerät anfordern; anschließend mit Wire.available / Wire.read lesen."
            es: "Solicitar bytes de un periférico; leerlos después con Wire.available / Wire.read."
            ja: "ペリフェラルデバイスからバイトを要求し、その後 Wire.available / Wire.read で読み取ります。"
