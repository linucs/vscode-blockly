            zh-tw: "Wire.write %1"
            fr: "Wire.write %1"
            de: "Wire.write %1"
            es: "Wire.write %1"
            ja: "Wire.write %1"
            ko: "Wire.write %1"
            ru: "Wire.write %1"
            pt-br: "Wire.write %1"
            tr: "Wire.write %1"
            pl: "Wire.write %1"
