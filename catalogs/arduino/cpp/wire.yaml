            pt-br: "Solicitar bytes de um periférico; lê-los depois com Wire.available / Wire.read."
            tr: "Bir çevre biriminden bayt iste; ardından Wire.available / Wire.read ile oku."
            pl: "Żądaj bajtów z urządzenia peryferyjnego; odczytaj je potem za pomocą Wire.available / Wire.read."
            cs: "Vyžádat bajty z periferie; poté je přečíst pomocí Wire.available / Wire.read."
            hu: "Bájtok kérése perifériától; ezután Wire.available / Wire.read segítségével olvasd ki."
