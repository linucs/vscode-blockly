# yaml-language-server: $schema=https://raw.githubusercontent.com/linucs/vscode-blockly/refs/heads/main/src/catalog/block-catalog_v1.schema.json
id: arduino_wire
category: "Communication::I2C"
docs:
  library: "https://docs.arduino.cc/language-reference/en/functions/communication/wire/"
implementations:
  - runtime: "arduino:cpp"
    codegen:
      imports:
        - "#include <Wire.h>"
    blocks:
      # --- Wire.begin([address]) (place in a setup block) ---
      - blockly:
          type: cpp_wire_begin
          message0:
            en: "Wire.begin %1"
            it: "Wire.begin %1"
          args0:
            - type: input_value
              name: ADDRESS
          previousStatement: null
          nextStatement: null
          inputsInline: true
          tooltip:
            en: "Join the I2C bus. No address = controller; with an address = peripheral. Place inside a 'setup' block."
            it: "Entra nel bus I2C. Senza indirizzo = controller; con indirizzo = periferica. Posiziona dentro un blocco 'setup'."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/wire/begin/"
        codegen:
          body:
            - "Wire.begin({{ADDRESS}});"
          inputDefaults:
            ADDRESS: ""

      # --- Wire.end ---
      - blockly:
          type: cpp_wire_end
          message0:
            en: "Wire.end"
            it: "Wire.end"
          args0: []
          previousStatement: null
          nextStatement: null
          tooltip:
            en: "Disable the Wire library and release the I2C bus."
            it: "Disabilita la libreria Wire e rilascia il bus I2C."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/wire/end/"
        codegen:
          body:
            - "Wire.end();"

      # --- Wire.beginTransmission(address) ---
      - blockly:
          type: cpp_wire_begin_transmission
          message0:
            en: "Wire.beginTransmission to %1"
            it: "Wire.beginTransmission a %1"
          args0:
            - type: input_value
              name: ADDRESS
              check: ["Number", "int", "unsigned int", "byte", "word", "uint8_t", "uint16_t", "uint32_t"]
          previousStatement: null
          nextStatement: null
          inputsInline: true
          tooltip:
            en: "Begin a queued transmission to the I2C peripheral at the given address."
            it: "Inizia una trasmissione in coda verso la periferica I2C all'indirizzo indicato."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/wire/beginTransmission/"
        codegen:
          body:
            - "Wire.beginTransmission({{ADDRESS}});"
          inputDefaults:
            ADDRESS: "8"

      # --- Wire.endTransmission ---
      - blockly:
          type: cpp_wire_end_transmission
          message0:
            en: "Wire.endTransmission"
            it: "Wire.endTransmission"
          args0: []
          output: Number
          tooltip:
            en: "Transmit the queued bytes and end the transmission; returns a status code."
            it: "Trasmetti i byte in coda e termina la trasmissione; restituisce un codice di stato."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/wire/endTransmission/"
        codegen:
          body:
            - "Wire.endTransmission()"
          precedence: ATOMIC

      # --- Wire.write(data) ---
      - blockly:
          type: cpp_wire_write
          message0:
            en: "Wire.write %1"
            it: "Wire.write %1"
          args0:
            - type: input_value
              name: DATA
              check: ["Number", "int", "unsigned int", "long", "unsigned long", "byte", "word", "uint8_t", "uint16_t", "uint32_t", "int8_t", "int16_t", "int32_t", "String"]
          previousStatement: null
          nextStatement: null
          inputsInline: true
          tooltip:
            en: "Queue bytes for transmission (controller) or send bytes in response to a request (peripheral)."
            it: "Accoda byte per la trasmissione (controller) o invia byte in risposta a una richiesta (periferica)."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/wire/write/"
        codegen:
          body:
            - "Wire.write({{DATA}});"
          inputDefaults:
            DATA: "0"

      # --- Wire.read ---
      - blockly:
          type: cpp_wire_read
          message0:
            en: "Wire.read"
            it: "Wire.read"
          args0: []
          output: Number
          tooltip:
            en: "Read one byte received from a peripheral or sent from a controller."
            it: "Leggi un byte ricevuto da una periferica o inviato da un controller."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/wire/read/"
        codegen:
          body:
            - "Wire.read()"
          precedence: ATOMIC

      # --- Wire.available ---
      - blockly:
          type: cpp_wire_available
          message0:
            en: "Wire.available"
            it: "Wire.available"
          args0: []
          output: Number
          tooltip:
            en: "Return the number of bytes available to read."
            it: "Restituisce il numero di byte disponibili da leggere."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/wire/available/"
        codegen:
          body:
            - "Wire.available()"
          precedence: ATOMIC

      # --- Wire.requestFrom(address, count) ---
      - blockly:
          type: cpp_wire_request_from
          message0:
            en: "Wire.requestFrom address %1 count %2"
            it: "Wire.requestFrom indirizzo %1 quantita %2"
          args0:
            - type: input_value
              name: ADDRESS
              check: ["Number", "int", "unsigned int", "byte", "word", "uint8_t", "uint16_t", "uint32_t"]
            - type: input_value
              name: COUNT
              check: ["Number", "int", "unsigned int", "byte", "word", "uint8_t", "uint16_t", "uint32_t"]
          previousStatement: null
          nextStatement: null
          inputsInline: true
          tooltip:
            en: "Request bytes from a peripheral device; read them afterwards with Wire.available / Wire.read."
            it: "Richiedi byte da una periferica; leggili successivamente con Wire.available / Wire.read."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/wire/requestFrom/"
        codegen:
          body:
            - "Wire.requestFrom({{ADDRESS}}, {{COUNT}});"
          inputDefaults:
            ADDRESS: "8"
            COUNT: "1"

      # --- Wire.setClock(hz) (place in a setup block) ---
      - blockly:
          type: cpp_wire_set_clock
          message0:
            en: "Wire.setClock %1 Hz"
            it: "Wire.setClock %1 Hz"
          args0:
            - type: field_dropdown
              name: HZ
              options:
                - ["100000 (standard)", "100000"]
                - ["400000 (fast)", "400000"]
                - ["1000000 (fast+)", "1000000"]
          previousStatement: null
          nextStatement: null
          tooltip:
            en: "Set the I2C clock frequency. Place inside a 'setup' block."
            it: "Imposta la frequenza del clock I2C. Posiziona dentro un blocco 'setup'."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/wire/setClock/"
        codegen:
          body:
            - "Wire.setClock({{HZ}});"

      # --- Wire.onReceive / onRequest (consolidated, dropdown) ---
      - blockly:
          type: cpp_wire_on_event
          message0:
            en: "Wire %1 call %2"
            it: "Wire %1 chiama %2"
          args0:
            - type: field_dropdown
              name: FUNC
              options:
                - ["onReceive", "onReceive"]
                - ["onRequest", "onRequest"]
            - type: field_input
              name: HANDLER
              text: "onWireEvent"
          previousStatement: null
          nextStatement: null
          inputsInline: true
          tooltip:
            en: "Register a callback (peripheral mode): onReceive when data arrives, onRequest when data is requested. Define a matching 'void onWireEvent(...)'. Place inside a 'setup' block."
            it: "Registra una callback (modalita periferica): onReceive quando arrivano dati, onRequest quando vengono richiesti dati. Definisci una funzione corrispondente 'void onWireEvent(...)'. Posiziona dentro un blocco 'setup'."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/wire/onReceive/"
        codegen:
          body:
            - "Wire.{{FUNC}}({{HANDLER}});"

      # --- Wire.setWireTimeout(timeout, reset) ---
      - blockly:
          type: cpp_wire_set_timeout
          message0:
            en: "Wire.setWireTimeout %1 µs reset on timeout %2"
            it: "Wire.setWireTimeout %1 µs reset al timeout %2"
          args0:
            - type: input_value
              name: TIMEOUT
              check: ["Number", "int", "unsigned int", "long", "unsigned long", "uint32_t"]
            - type: field_dropdown
              name: RESET
              options:
                - ["true", "true"]
                - ["false", "false"]
          previousStatement: null
          nextStatement: null
          inputsInline: true
          tooltip:
            en: "Enable a bus timeout to prevent hanging on a stuck I2C bus. Place inside a 'setup' block."
            it: "Abilita un timeout sul bus per evitare blocchi su un bus I2C bloccato. Posiziona dentro un blocco 'setup'."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/wire/setWireTimeout/"
        codegen:
          body:
            - "Wire.setWireTimeout({{TIMEOUT}}, {{RESET}});"
          inputDefaults:
            TIMEOUT: "25000"

      # --- Wire.clearWireTimeoutFlag ---
      - blockly:
          type: cpp_wire_clear_timeout_flag
          message0:
            en: "Wire.clearWireTimeoutFlag"
            it: "Wire.clearWireTimeoutFlag"
          args0: []
          previousStatement: null
          nextStatement: null
          tooltip:
            en: "Clear the I2C bus timeout flag after a timeout has been detected."
            it: "Cancella il flag di timeout del bus I2C dopo che e stato rilevato un timeout."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/wire/clearWireTimeoutFlag/"
        codegen:
          body:
            - "Wire.clearWireTimeoutFlag();"

      # --- Wire.getWireTimeoutFlag ---
      - blockly:
          type: cpp_wire_get_timeout_flag
          message0:
            en: "Wire.getWireTimeoutFlag"
            it: "Wire.getWireTimeoutFlag"
          args0: []
          output: Boolean
          tooltip:
            en: "Return whether a bus timeout has occurred since the flag was last cleared."
            it: "Restituisce se si e verificato un timeout del bus dall'ultima cancellazione del flag."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/wire/getWireTimeoutFlag/"
        codegen:
          body:
            - "Wire.getWireTimeoutFlag()"
          precedence: ATOMIC
