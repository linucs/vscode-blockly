          nextStatement: null
          inputsInline: true
          tooltip:
            en: "Queue bytes for transmission (controller) or send bytes in response to a request (peripheral)."
            it: "Accoda byte per la trasmissione (controller) o invia byte in risposta a una richiesta (periferica)."
            zh-cn: "将字节排队等待传输（控制器）或发送字节以响应请求（外设）。"
            zh-tw: "將位元組排入傳輸佇列（控制器）或傳送位元組以回應請求（外設）。"
            fr: "Mettre en file d'attente des octets pour la transmission (contrôleur) ou envoyer des octets en réponse à une requête (périphérique)."
            de: "Bytes zur Übertragung in die Warteschlange stellen (Controller) oder Bytes als Antwort auf eine Anfrage senden (Peripheriegerät)."
            es: "Poner bytes en cola para transmisión (controlador) o enviar bytes en respuesta a una solicitud (periférico)."
            ja: "送信用にバイトをキューに入れる（コントローラー）、またはリクエストに応じてバイトを送信する（ペリフェラル）。"
            ko: "전송을 위해 바이트를 대기열에 넣거나(컨트롤러) 요청에 응답하여 바이트를 전송합니다(주변장치)."
            ru: "Поставить байты в очередь для передачи (контроллер) или отправить байты в ответ на запрос (периферия)."
            pt-br: "Enfileirar bytes para transmissão (controlador) ou enviar bytes em resposta a uma solicitação (periférico)."
            tr: "İletim için baytları kuyruğa al (denetleyici) veya bir isteğe yanıt olarak bayt gönder (çevre birimi)."
            pl: "Kolejkuj bajty do transmisji (kontroler) lub wyślij bajty w odpowiedzi na żądanie (urządzenie peryferyjne)."
            cs: "Zařadit bajty do fronty k přenosu (řadič) nebo odeslat bajty v odpovědi na požadavek (periferie)."
            hu: "Bájtok sorba állítása átvitelhez (vezérlő) vagy bájtok küldése kérésre válaszul (periféria)."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/wire/write/"
        codegen:
          body:
            - "Wire.write({{DATA}});"
          inputDefaults:
            DATA: "0"

