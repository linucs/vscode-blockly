            zh-cn: "Wire.requestFrom 地址 %1 数量 %2"
            zh-tw: "Wire.requestFrom 地址 %1 數量 %2"
            fr: "Wire.requestFrom adresse %1 nombre %2"
            de: "Wire.requestFrom Adresse %1 Anzahl %2"
            es: "Wire.requestFrom dirección %1 cantidad %2"
            ja: "Wire.requestFrom アドレス %1 個数 %2"
            ko: "Wire.requestFrom 주소 %1 개수 %2"
            ru: "Wire.requestFrom адрес %1 количество %2"
            pt-br: "Wire.requestFrom endereço %1 quantidade %2"
