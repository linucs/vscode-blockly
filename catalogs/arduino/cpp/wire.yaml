      # --- Wire.onReceive / onRequest (consolidated, dropdown) ---
      - blockly:
          type: cpp_wire_on_event
          message0:
            en: "Wire %1 call %2"
            it: "Wire %1 chiama %2"
            zh-cn: "Wire %1 调用 %2"
            zh-tw: "Wire %1 呼叫 %2"
            fr: "Wire %1 appeler %2"
            de: "Wire %1 aufrufen %2"
            es: "Wire %1 llamar %2"
            ja: "Wire %1 呼び出し %2"
            ko: "Wire %1 호출 %2"
            ru: "Wire %1 вызвать %2"
            pt-br: "Wire %1 chamar %2"
            tr: "Wire %1 çağır %2"
            pl: "Wire %1 wywołaj %2"
            cs: "Wire %1 zavolat %2"
            hu: "Wire %1 hívás %2"
          args0:
            - type: field_dropdown
              name: FUNC
              options:
                - ["onReceive", "onReceive"]
                - ["onRequest", "onRequest"]
            - type: field_input
              name: HANDLER
              text: "onWireEvent"
          previousStatement: null
          nextStatement: null
          inputsInline: true
          tooltip:
            en: "Register a callback (peripheral mode): onReceive when data arrives, onRequest when data is requested. Define a matching 'void onWireEvent(...)'. Place inside a 'setup' block."
            it: "Registra una callback (modalita periferica): onReceive quando arrivano dati, onRequest quando vengono richiesti dati. Definisci una funzione corrispondente 'void onWireEvent(...)'. Posiziona dentro un blocco 'setup'."
            zh-cn: "注册回调（外设模式）：onReceive 在数据到达时触发，onRequest 在请求数据时触发。定义匹配的 'void onWireEvent(...)'。放在 'setup' 块内。"
            zh-tw: "註冊回呼（外設模式）：onReceive 在資料到達時觸發，onRequest 在請求資料時觸發。定義匹配的 'void onWireEvent(...)'。放在 'setup' 區塊內。"
            fr: "Enregistrer un callback (mode périphérique) : onReceive à l'arrivée de données, onRequest lors d'une demande de données. Définir une fonction correspondante 'void onWireEvent(...)'. Placer dans un bloc 'setup'."
            de: "Einen Callback registrieren (Peripheriemodus): onReceive bei Dateneingang, onRequest bei Datenanforderung. Eine passende Funktion 'void onWireEvent(...)' definieren. In einen 'setup'-Block setzen."
            es: "Registrar un callback (modo periférico): onReceive cuando llegan datos, onRequest cuando se solicitan datos. Definir una función correspondiente 'void onWireEvent(...)'. Colocar dentro de un bloque 'setup'."
            ja: "コールバックを登録（ペリフェラルモード）：onReceive はデータ受信時、onRequest はデータ要求時。対応する 'void onWireEvent(...)' を定義してください。'setup' ブロック内に配置してください。"
            ko: "콜백 등록(주변장치 모드): onReceive는 데이터 도착 시, onRequest는 데이터 요청 시. 'void onWireEvent(...)' 함수를 정의하세요. 'setup' 블록 안에 배치하세요."
            ru: "Зарегистрировать обратный вызов (режим периферии): onReceive при поступлении данных, onRequest при запросе данных. Определите соответствующую функцию 'void onWireEvent(...)'. Поместите в блок 'setup'."
            pt-br: "Registrar um callback (modo periférico): onReceive quando dados chegam, onRequest quando dados são solicitados. Definir uma função correspondente 'void onWireEvent(...)'. Colocar dentro de um bloco 'setup'."
            tr: "Bir geri çağırma kaydet (çevre birimi modu): onReceive veri geldiğinde, onRequest veri istendiğinde. Eşleşen bir 'void onWireEvent(...)' tanımlayın. 'setup' bloğunun içine yerleştirin."
            pl: "Zarejestruj wywołanie zwrotne (tryb peryferyjny): onReceive gdy przychodzą dane, onRequest gdy dane są żądane. Zdefiniuj pasującą funkcję 'void onWireEvent(...)'. Umieść w bloku 'setup'."
            cs: "Zaregistrovat zpětné volání (režim periferie): onReceive při příchodu dat, onRequest při žádosti o data. Definujte odpovídající funkci 'void onWireEvent(...)'. Umístěte do bloku 'setup'."
            hu: "Visszahívás regisztrálása (periféria mód): onReceive adatok érkezésekor, onRequest adatkéréskor. Definiálj egy megfelelő 'void onWireEvent(...)' függvényt. Helyezd egy 'setup' blokkba."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/wire/onReceive/"
        codegen:
          body:
            - "Wire.{{FUNC}}({{HANDLER}});"

      # --- Wire.setWireTimeout(timeout, reset) ---
      - blockly:
          type: cpp_wire_set_timeout
          message0:
            en: "Wire.setWireTimeout %1 µs reset on timeout %2"
            it: "Wire.setWireTimeout %1 µs reset al timeout %2"
            zh-cn: "Wire.setWireTimeout %1 µs 超时时复位 %2"
            zh-tw: "Wire.setWireTimeout %1 µs 逾時時重設 %2"
            fr: "Wire.setWireTimeout %1 µs reset au timeout %2"
            de: "Wire.setWireTimeout %1 µs Reset bei Timeout %2"
            es: "Wire.setWireTimeout %1 µs reset en timeout %2"
            ja: "Wire.setWireTimeout %1 µs タイムアウト時リセット %2"
            ko: "Wire.setWireTimeout %1 µs 타임아웃 시 리셋 %2"
            ru: "Wire.setWireTimeout %1 мкс сброс по таймауту %2"
            pt-br: "Wire.setWireTimeout %1 µs reset no timeout %2"
            tr: "Wire.setWireTimeout %1 µs zaman aşımında sıfırla %2"
            pl: "Wire.setWireTimeout %1 µs reset przy timeout %2"
            cs: "Wire.setWireTimeout %1 µs reset při timeoutu %2"
            hu: "Wire.setWireTimeout %1 µs reset időtúllépéskor %2"
          args0:
            - type: input_value
              name: TIMEOUT
              check: ["Number", "int", "unsigned int", "long", "unsigned long", "uint32_t"]
            - type: field_dropdown
              name: RESET
              options:
                - ["true", "true"]
                - ["false", "false"]
          previousStatement: null
          nextStatement: null
          inputsInline: true
          tooltip:
            en: "Enable a bus timeout to prevent hanging on a stuck I2C bus. Place inside a 'setup' block."
            it: "Abilita un timeout sul bus per evitare blocchi su un bus I2C bloccato. Posiziona dentro un blocco 'setup'."
            zh-cn: "启用总线超时以防止在阻塞的 I2C 总线上挂起。放在 'setup' 块内。"
            zh-tw: "啟用匯流排逾時以防止在阻塞的 I2C 匯流排上掛起。放在 'setup' 區塊內。"
            fr: "Activer un timeout de bus pour éviter un blocage sur un bus I2C bloqué. Placer dans un bloc 'setup'."
            de: "Bus-Timeout aktivieren, um ein Hängenbleiben auf einem blockierten I2C-Bus zu verhindern. In einen 'setup'-Block setzen."
            es: "Habilitar un timeout de bus para evitar bloqueos en un bus I2C atascado. Colocar dentro de un bloque 'setup'."
            ja: "停止した I2C バスでのハングを防ぐためにバスタイムアウトを有効にします。'setup' ブロック内に配置してください。"
            ko: "멈춘 I2C 버스에서 중단을 방지하기 위해 버스 타임아웃을 활성화합니다. 'setup' 블록 안에 배치하세요."
            ru: "Включить таймаут шины для предотвращения зависания на заблокированной шине I2C. Поместите в блок 'setup'."
            pt-br: "Habilitar um timeout de barramento para evitar travamento em um barramento I2C bloqueado. Colocar dentro de um bloco 'setup'."
            tr: "Takılı bir I2C veri yolunda askıda kalmayı önlemek için veri yolu zaman aşımını etkinleştir. 'setup' bloğunun içine yerleştirin."
            pl: "Włącz timeout magistrali, aby zapobiec zawieszeniu na zablokowanej magistrali I2C. Umieść w bloku 'setup'."
            cs: "Povolit timeout sběrnice pro zabránění zamrznutí na zaseknuté sběrnici I2C. Umístěte do bloku 'setup'."
            hu: "Busz időtúllépés engedélyezése az elakadt I2C buszon való lefagyás megelőzésére. Helyezd egy 'setup' blokkba."
          helpUrl: "https://docs.arduino.cc/language-reference/en/functions/communication/wire/setWireTimeout/"
        codegen:
          body:
            - "Wire.setWireTimeout({{TIMEOUT}}, {{RESET}});"
          inputDefaults:
            TIMEOUT: "25000"

